# ===========================================================================
# Release — creates a GitHub Release when a version tag is pushed
#
# Usage:
#   git tag v1.0.0
#   git push origin v1.0.0
#
# This will create a GitHub Release with auto-generated changelog.
# ===========================================================================

name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run tests before release
        run: |
          pip install -e ".[dev]"
          python -m pytest tests/ -q
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          draft: false
