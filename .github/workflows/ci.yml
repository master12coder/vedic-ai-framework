name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Lint + Test + Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install packages
        run: |
          pip install -e engine/ -e "products/[groq,pdf]" -e "apps/[web]"
          pip install pytest ruff mypy types-PyYAML types-pytz

      - name: Lint
        run: ruff check engine/src/ products/src/ apps/src/

      - name: Type check
        run: mypy engine/src/ --ignore-missing-imports --disable-error-code no-any-return --disable-error-code attr-defined

      - name: Test
        run: pytest tests/ -v --tb=short

      - name: Import boundaries
        run: python scripts/check_imports.py

      - name: Plugin contracts
        run: python scripts/check_plugins.py

      - name: Safety audit
        run: python scripts/safety_audit.py
