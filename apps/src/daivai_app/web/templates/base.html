<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#FF6F00">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>{% block title %}DaivAI{% endblock %}</title>
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
  <link rel="stylesheet" href="/static/tokens.css">
  <link rel="stylesheet" href="/static/components.css">
  {% block head %}{% endblock %}
</head>
<body>
  <div class="j-page">
    <div class="j-sacred-bar">॥ श्री गणेशाय नमः ॥</div>
    {% block content %}{% endblock %}
    <div class="j-divider"></div>
    <div class="j-footer">
      <span class="j-text-sacred">शुभम् भवतु</span><br>
      <span class="j-text-xs">DaivAI</span>
    </div>
  </div>
  <script>
    // Scroll fade-in animation
    document.addEventListener('DOMContentLoaded', () => {
      const obs = new IntersectionObserver((entries) => {
        entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('j-visible'); });
      }, { threshold: 0.1 });
      document.querySelectorAll('.j-card').forEach(el => {
        el.classList.add('j-fade-in');
        obs.observe(el);
      });
    });
  </script>
</body>
</html>
