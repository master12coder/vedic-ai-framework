{% extends "base.html" %}
{% block title %}नई कुंडली — Jyotish AI{% endblock %}

{% block content %}
<div class="j-p-md">
  <a href="/dashboard" class="j-text-sm" style="color: var(--j-saffron-600); text-decoration: none;">← वापस</a>

  <h1 style="font-size: 1.3rem; color: var(--j-maroon); margin: var(--j-space-md) 0;">
    नई कुंडली बनाएं
  </h1>

  <form action="/generate" method="POST">
    <div class="j-card">
      <div class="j-card-header">मूल जानकारी — Basic Details</div>

      <div class="j-form-group">
        <label class="j-label">पूरा नाम / Full Name *</label>
        <input type="text" name="name" class="j-input" required placeholder="मनीष चौरसिया">
      </div>

      <div class="j-form-group">
        <label class="j-label">जन्म तिथि / Date of Birth *</label>
        <input type="text" name="dob" class="j-input" required placeholder="DD/MM/YYYY" pattern="\d{2}/\d{2}/\d{4}">
      </div>

      <div class="j-form-group">
        <label class="j-label">जन्म समय / Time of Birth *</label>
        <input type="text" name="tob" class="j-input" required placeholder="HH:MM (24h)" pattern="\d{2}:\d{2}">
      </div>

      <div class="j-form-group">
        <label class="j-label">जन्म स्थान / Place of Birth</label>
        <input type="text" name="place" class="j-input" placeholder="वाराणसी">
      </div>

      <div style="display: flex; gap: var(--j-space-md);">
        <div class="j-form-group" style="flex: 1;">
          <label class="j-label">अक्षांश / Latitude</label>
          <input type="number" name="lat" class="j-input" step="0.0001" placeholder="25.3176" value="25.3176">
        </div>
        <div class="j-form-group" style="flex: 1;">
          <label class="j-label">देशांतर / Longitude</label>
          <input type="number" name="lon" class="j-input" step="0.0001" placeholder="83.0067" value="83.0067">
        </div>
      </div>

      <div class="j-form-group">
        <label class="j-label">लिंग / Gender</label>
        <div class="j-radio-row">
          <label><input type="radio" name="gender" value="Male" checked> पुरुष / Male</label>
          <label><input type="radio" name="gender" value="Female"> स्त्री / Female</label>
        </div>
      </div>
    </div>

    <button type="submit" class="j-btn j-btn-saffron j-btn-block" style="margin: var(--j-space-md);">
      कुंडली बनाएं →
    </button>
  </form>
</div>
{% endblock %}
