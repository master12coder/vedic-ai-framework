  - number: 12
    name_en: Uttara Phalguni
    name_hi: उत्तर फाल्गुनी
    deity: Aryama
    deity_hi: आर्यमन्
    mantra: "ओम् आर्यम्णे नमः"
    mantra_en: "Om Aryamne Namaha"
