    deity: Nirriti (Goddess of destruction / dissolution)
    deity_hi: निऋति
    mantra: "ओम् निऋतये नमः"
    mantra_en: "Om Nirritaye Namaha"
    extended_mantra: "ओम् नृं निऋत्यै नमः"
    japa_count: 108
    deity_domain: "Root, dissolution, research, moksha, untying the bound"

  - number: 20
    name_en: Purva Ashadha
    name_hi: पूर्वाषाढा
    deity: Apas (Waters / Varuna)
    deity_hi: अपः / वरुण
    mantra: "ओम् अद्भ्यो नमः"
    mantra_en: "Om Adbhyo Namaha"
    extended_mantra: "ओम् अं अद्भ्यः वरुणाय नमः"
    japa_count: 108
    deity_domain: "Purification, invincibility, water element, emotional strength"

  - number: 21
    name_en: Uttara Ashadha
    name_hi: उत्तराषाढा
    deity: Vishwadevas (Universal cosmic gods)
    deity_hi: विश्वेदेव
    mantra: "ओम् विश्वेभ्यो देवेभ्यो नमः"
    mantra_en: "Om Vishvebhyo Devebhyo Namaha"
    extended_mantra: "ओम् विश्वेभ्यो देवेभ्यः सर्वशक्तिभ्यो नमः"
    japa_count: 108
    deity_domain: "Universal dharma, ultimate victory, righteousness, final triumph"

  - number: 22
