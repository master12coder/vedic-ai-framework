  - number: 14
    name_en: Chitra
    name_hi: चित्रा
    deity: Tvashtar (Vishwakarma)
    deity_hi: त्वष्टा / विश्वकर्मा
    mantra: "ओम् विश्वकर्मणे नमः"
    mantra_en: "Om Vishwakarmanye Namaha"
    extended_mantra: "ओम् त्वं त्वष्ट्रे विश्वकर्मणे नमः"
    japa_count: 108
