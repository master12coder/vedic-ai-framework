    extended_mantra: "ओम् पित् पितृभ्यः स्वधायिभ्यः स्वधा नमः"
    japa_count: 108
    deity_domain: "Ancestral blessings, royal heritage, dharma, past-life karma"

  - number: 11
    name_en: Purva Phalguni
    name_hi: पूर्व फाल्गुनी
    deity: Bhaga
    deity_hi: भग
    mantra: "ओम् भगाय नमः"
    mantra_en: "Om Bhagaya Namaha"
    extended_mantra: "ओम् भं भगाय सौभाग्याय नमः"
    japa_count: 108
