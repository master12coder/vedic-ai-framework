# ── Japa Rules ────────────────────────────────────────────────────────────────
japa_rules:
  mala_beads: 108
  session_minimum: 1       # minimum malas per session
  session_recommended: 3   # 3 malas = 324 japa
  mantra_speed: "Not too fast, not too slow — approx 4–5 seconds per repetition"
  voice: "Manasika (mental) japa is most powerful; Upamshu (whispered) is moderate; Vachika (spoken) is least but acceptable for beginners"
  purification: "Wash hands and face before japa; sit facing prescribed direction"
  completion: "At end of each mala, do not cross the 'Meru' bead — reverse direction"
  continuity: "Once started, complete the session; interruptions diminish efficacy"
  moon_phase_best: "Shukla Paksha (waxing moon) for increasing benefics; Krishna Paksha for decreasing malefics"
