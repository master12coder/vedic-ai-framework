# ═══════════════════════════════════════════════════════════════
# SHASHTYAMSHA (D60) DEITIES — 60 Divisions of Each Sign
# ═══════════════════════════════════════════════════════════════
# Source: BPHS Ch.6 "Shashtyamsha Adhyaya" (Brihat Parashara Hora Shastra)
# Confidence: canonical
#
# Each 30° sign is divided into 60 equal parts of 0.5° each.
# Each part is presided over by one of 60 deities with a fixed
# nature (Saumya/Krura/Mishra) that modifies a planet's results.
#
# ODD SIGNS (Mesha, Mithuna, Simha, Tula, Dhanu, Kumbha):
#   Part 1-60 in forward order (part 0 = deity 1, part 59 = deity 60)
#
# EVEN SIGNS (Vrishabha, Karka, Kanya, Vrischika, Makara, Meena):
#   Part 1-60 in reverse order (part 0 = deity 60, part 59 = deity 1)
#
# Key rule (BPHS):
#   Planet in Saumya Shashtyamsha → gives good results even if afflicted
#   Planet in Krura Shashtyamsha → gives trouble even if well-placed
#   If D1 and D60 agree, the result is CERTAIN (most telling chart)
# ═══════════════════════════════════════════════════════════════

