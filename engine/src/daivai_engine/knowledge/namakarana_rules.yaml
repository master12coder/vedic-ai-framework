# ── Rashi letters ──────────────────────────────────────────────────────────
# Each rashi has 9 padas (2.25 nakshatras × 4 padas). The starting syllables
# of those padas become the "rashi letters" used in traditional naming.
# rashi_index: 0-based (matches SIGNS list in constants.py)

rashi_letters:
  - rashi: Mesha
    rashi_index: 0
    letters: ["Chu", "Che", "Cho", "La", "Li", "Lu", "Le", "Lo", "A"]
    primary_letters: ["A", "La", "Li"]

  - rashi: Vrishabha
    rashi_index: 1
    letters: ["I", "U", "E", "O", "Va", "Vi", "Vu", "Ve", "Vo"]
    primary_letters: ["Va", "Vi", "Ba", "Bi"]

  - rashi: Mithuna
    rashi_index: 2
    letters: ["Ka", "Ki", "Ku", "Gha", "Ing", "Chha", "Ke", "Ko", "Ha"]
    primary_letters: ["Ka", "Ki", "Ke", "Ko"]

  - rashi: Karka
    rashi_index: 3
    letters: ["Hi", "Hu", "He", "Ho", "Da", "Di", "Du", "De", "Do"]
    primary_letters: ["Ha", "Hi", "Hu", "He"]

  - rashi: Simha
    rashi_index: 4
    letters: ["Ma", "Mi", "Mu", "Me", "Mo", "Ta", "Ti", "Tu", "Te"]
    primary_letters: ["Ma", "Mi", "Mu", "Me"]

  - rashi: Kanya
    rashi_index: 5
    letters: ["To", "Pa", "Pi", "Pu", "Sha", "Na", "Tha", "Pe", "Po"]
    primary_letters: ["Pa", "Pi", "Pu"]

  - rashi: Tula
    rashi_index: 6
    letters: ["Ra", "Ri", "Ru", "Re", "Ro", "Ta", "Ti", "Tu", "Te"]
    primary_letters: ["Ra", "Ri", "Ru", "Re"]

  - rashi: Vrischika
    rashi_index: 7
    letters: ["To", "Na", "Ni", "Nu", "Ne", "No", "Ya", "Yi", "Yu"]
    primary_letters: ["Na", "Ni", "Nu", "Ya"]

  - rashi: Dhanu
    rashi_index: 8
    letters: ["Ye", "Yo", "Bha", "Bhi", "Bhu", "Dha", "Pha", "Bhe", "Bho"]
    primary_letters: ["Bha", "Dha", "Ye", "Yo"]

  - rashi: Makara
    rashi_index: 9
    letters: ["Ja", "Ji", "Ju", "Je", "Jo", "Gha", "Ga", "Gi", "Gu"]
    primary_letters: ["Ja", "Ji", "Ga", "Gi"]

  - rashi: Kumbha
    rashi_index: 10
    letters: ["Ge", "Go", "Sa", "Si", "Su", "Se", "So", "Da", "Di"]
    primary_letters: ["Sa", "Si", "Su", "Go"]

  - rashi: Meena
    rashi_index: 11
    letters: ["Du", "Tha", "Jha", "Da", "De", "Do", "Cha", "Chi", "Di"]
    primary_letters: ["De", "Do", "Cha", "Chi"]

# ── Numerology letter-to-number mapping (Chaldean system) ─────────────────
# Used to compute name number (Naam Ank) from the name's letters.
# For Sanskrit transliterated names, consonant clusters map to the first letter.
# Reduce sum to single digit (except master numbers 11, 22).

numerology:
  letter_values:
    a: 1
    b: 2
    c: 3
    d: 4
    e: 5
    f: 8
    g: 3
    h: 5
    i: 1
    j: 1
    k: 2
    l: 3
    m: 4
    n: 5
