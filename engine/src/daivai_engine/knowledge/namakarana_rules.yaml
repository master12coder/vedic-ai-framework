# Namakarana Rules — Vedic Naming Ceremony
# Source: Traditional Jyotish practice (Parashari, Muhurta Chintamani)
#
# Each rashi contains exactly 9 padas (3 nakshatras × partial, 108 total / 12 signs).
# The letters below are the recommended starting syllables derived from those padas.

# ── Rashi-based starting letters ─────────────────────────────────────────────
# Format: rashi_name → {letters, ruling_planet, element}
# Syllables listed in pada order within the rashi.

rashi_letters:
  Mesha:
    letters: ["Chu", "Che", "Cho", "La", "Li", "Lu", "Le", "Lo", "A"]
    ruling_planet: Mars
    element: Fire
    # Padas: Ashwini 1-4, Bharani 1-4, Krittika 1

  Vrishabha:
    letters: ["I", "U", "E", "O", "Va", "Vi", "Vu", "Ve", "Vo"]
    ruling_planet: Venus
    element: Earth
    # Padas: Krittika 2-4, Rohini 1-4, Mrigashira 1-2

  Mithuna:
    letters: ["Ka", "Ki", "Ku", "Gha", "Na", "Ke", "Ko", "Ha", "Hi"]
    ruling_planet: Mercury
    element: Air
    # Padas: Mrigashira 3-4, Ardra 1-4, Punarvasu 1-3

  Karka:
    letters: ["Hi", "Hu", "He", "Ho", "Da", "Di", "Du", "De", "Do"]
    ruling_planet: Moon
    element: Water
    # Padas: Punarvasu 4, Pushya 1-4, Ashlesha 1-4

  Simha:
    letters: ["Ma", "Mi", "Mu", "Me", "Mo", "Ta", "Ti", "Tu", "Te"]
    ruling_planet: Sun
    element: Fire
    # Padas: Magha 1-4, Purva Phalguni 1-4, Uttara Phalguni 1

  Kanya:
    letters: ["To", "Pa", "Pi", "Pu", "Sha", "Na", "Tha", "Pe", "Po"]
    ruling_planet: Mercury
    element: Earth
    # Padas: Uttara Phalguni 2-4, Hasta 1-4, Chitra 1-2

  Tula:
    letters: ["Ra", "Ri", "Ru", "Re", "Ro", "Ta", "Ti", "Tu", "Te"]
    ruling_planet: Venus
    element: Air
    # Padas: Chitra 3-4, Swati 1-4, Vishakha 1-3

  Vrischika:
    letters: ["To", "Na", "Ni", "Nu", "Ne", "No", "Ya", "Yi", "Yu"]
    ruling_planet: Mars
    element: Water
    # Padas: Vishakha 4, Anuradha 1-4, Jyeshtha 1-4

  Dhanu:
    letters: ["Ye", "Yo", "Bha", "Bhi", "Bhu", "Dha", "Pha", "Bhe", "Bho"]
    ruling_planet: Jupiter
    element: Fire
    # Padas: Moola 1-4, Purva Ashadha 1-4, Uttara Ashadha 1

  Makara:
    letters: ["Bho", "Ja", "Ji", "Ju", "Je", "Jo", "Gha", "Ga", "Gi"]
    ruling_planet: Saturn
    element: Earth
    # Padas: Uttara Ashadha 2-4, Shravana 1-4, Dhanishta 1-2

  Kumbha:
    letters: ["Gu", "Ge", "Go", "Sa", "Si", "Su", "Se", "So", "Da"]
    ruling_planet: Saturn
    element: Air
    # Padas: Dhanishta 3-4, Shatabhisha 1-4, Purva Bhadrapada 1-3

  Meena:
    letters: ["Di", "Du", "Tha", "Jha", "Da", "De", "Do", "Cha", "Chi"]
    ruling_planet: Jupiter
    element: Water
    # Padas: Purva Bhadrapada 4, Uttara Bhadrapada 1-4, Revati 1-4

# ── Planet → Chaldean numerology number ─────────────────────────────────────
# Source: Chaldean numerology system
planet_numbers:
  Sun: 1
  Moon: 2
  Jupiter: 3
  Rahu: 4
  Mercury: 5
  Venus: 6
  Ketu: 7
  Saturn: 8
  Mars: 9

# ── Name number compatibility (birth number → compatible name numbers) ───────
# compatible = highly harmonious
# neutral    = acceptable
# avoid      = discordant; may create friction
# Source: Chaldean numerology compatibility rules

numerology_compatibility:
  1:
    compatible: [1, 2, 4, 7]
    neutral: [3, 6, 9]
    avoid: [5, 8]
    significance: Leadership, independence, originality

  2:
    compatible: [1, 2, 7, 9]
    neutral: [3, 4, 6]
    avoid: [5, 8]
    significance: Cooperation, diplomacy, sensitivity

  3:
    compatible: [3, 6, 9]
    neutral: [1, 2, 5]
    avoid: [4, 7, 8]
    significance: Expression, creativity, social nature

  4:
    compatible: [1, 4, 7, 8]
    neutral: [2, 5, 6]
    avoid: [3, 9]
    significance: Stability, discipline, hard work

  5:
    compatible: [1, 3, 5, 6]
    neutral: [2, 9]
    avoid: [4, 7, 8]
    significance: Freedom, adaptability, versatility

  6:
    compatible: [3, 5, 6, 9]
    neutral: [1, 2, 4]
    avoid: [7, 8]
    significance: Harmony, responsibility, nurturing

  7:
    compatible: [1, 2, 4, 7]
    neutral: [3, 5, 9]
    avoid: [6, 8]
    significance: Spirituality, introspection, wisdom

  8:
    compatible: [4, 8]
    neutral: [1, 5, 6]
    avoid: [2, 3, 7, 9]
    significance: Power, ambition, material success

  9:
    compatible: [2, 3, 6, 9]
    neutral: [1, 5, 7]
    avoid: [4, 8]
    significance: Compassion, completion, universal love
