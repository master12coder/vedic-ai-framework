# ── Akshar-to-planet mapping ───────────────────────────────────────────────
# Based on Sanskrit phonetics and classical Hora Shastra association.
# Used to identify the planetary ruler of the starting sound of a name.

planet_akshar:
  Sun:
    sounds: ["O", "A"]
    description: "Open vowel sounds — vitality, authority, leadership"
  Moon:
    sounds: ["Va", "Vi", "Vu", "Ve", "Vo", "Wa", "Ba", "Bi", "Bu"]
    description: "Labial + water sounds — nurturing, emotions, mind"
  Mars:
    sounds: ["Ka", "Ki", "Ku", "Ke", "Ko", "Ku"]
    description: "Ka-varga gutturals — energy, courage, action"
  Mercury:
    sounds: ["Gha", "Ing", "Chha", "Ga", "Gi", "Gu", "Ge", "Go"]
    description: "Mixed gutturals — intelligence, communication"
  Jupiter:
    sounds: ["Ha", "Hi", "Hu", "He", "Ho", "Ja", "Ji", "Ju", "Je", "Jo"]
