  Venus:
    sounds: ["Li", "Lu", "Le", "Lo", "La", "Pa", "Pi", "Pu", "Pe", "Po"]
    description: "Liquid + pa-varga — beauty, grace, arts, comfort"
  Saturn:
    sounds: ["Sa", "Si", "Su", "Se", "So", "Na", "Ni", "Nu", "Ne", "No"]
    description: "Sibilant + dental-na sounds — discipline, endurance"
  Rahu:
