# ── Muhurta rules for Namakarana ──────────────────────────────────────────
# Source: Muhurta Chintamani Ch.8, Dharmasindhu, Grihya Sutras.

muhurta_rules:
  traditional_timing:
    description: "Ceremony is traditionally on 10th-12th day after birth"
    days_after_birth: [10, 11, 12]
    note: "After mother's sutak (impurity) period ends"

  favorable_paksha:
    - Shukla  # Bright fortnight strongly preferred
    # Krishna paksha acceptable if Shukla is unavailable

  favorable_tithis:
    indices: [1, 2, 4, 6, 9, 10, 11, 12]  # 0-based: Dwitiya through Trayodashi
    names: ["Dwitiya", "Tritiya", "Panchami", "Saptami", "Dashami", "Ekadashi", "Dwadashi", "Trayodashi"]
    note: "Avoid Pratipada(0), Chaturthi(3), Shashthi(5), Ashtami(7), Navami(8), Chaturdashi(13), Amavasya(29)"

  unfavorable_tithis:
    indices: [0, 3, 5, 7, 8, 13, 29]  # Rikta + Amavasya
    note: "Rikta tithis (4,9,14) and Amavasya are strictly avoided"

  favorable_vara:
    - Monday     # Moon — mind, name, identity
    - Wednesday  # Mercury — intelligence, communication
    - Thursday   # Jupiter — auspiciousness, dharma
    - Friday     # Venus — beauty, grace, happiness

  unfavorable_vara:
    - Tuesday    # Mars — aggression
    - Saturday   # Saturn — delays, hardship
    - Sunday     # Sun — ego, rigidity (acceptable but not ideal)

  # Nakshatras grouped by quality for naming ceremony
  favorable_nakshatras:
    # Sthira (Fixed) — stability and longevity of name
    sthira: ["Rohini", "Uttara Phalguni", "Uttara Ashadha", "Uttara Bhadrapada"]
    # Mridu (Soft/Gentle) — sweetness and charm
    mridu: ["Mrigashira", "Chitra", "Anuradha", "Revati"]
    # Laghu (Swift/Light) — quick learning and adaptability
    laghu: ["Ashwini", "Pushya", "Hasta"]
    # Chara (Moveable) — adaptability and success
    chara: ["Punarvasu", "Swati", "Shravana", "Dhanishta", "Shatabhisha"]

  all_favorable_nakshatras:
    - Ashwini
    - Rohini
    - Mrigashira
    - Punarvasu
    - Pushya
    - Hasta
    - Uttara Phalguni
    - Chitra
    - Swati
    - Anuradha
    - Shravana
    - Dhanishta
    - Shatabhisha
    - Uttara Ashadha
    - Uttara Bhadrapada
    - Revati

  unfavorable_nakshatras:
    # Tikshna (Sharp) — inauspicious for naming
    - Ardra
    - Ashlesha
    - Jyeshtha
    - Moola
    # Ugra (Fierce) — causes hardship
    - Bharani
    - Magha
    - Purva Phalguni
    - Purva Ashadha
    - Purva Bhadrapada
    # Mixed — use with care
    - Krittika
    - Vishakha

  scoring:
    favorable_nakshatra: 3.0
    sthira_nakshatra_bonus: 1.0
    mridu_nakshatra_bonus: 0.5
    favorable_tithi: 1.0
    unfavorable_tithi_penalty: -2.5
    shukla_paksha_bonus: 1.0
    favorable_vara: 1.0
    unfavorable_vara_penalty: -1.5
    unfavorable_nakshatra_penalty: -3.0

