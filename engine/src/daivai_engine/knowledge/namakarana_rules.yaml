# Namakarana (Naming Ceremony) Rules
#
# Sources: Muhurta Chintamani, Brihat Samhita, Dharmasindhu,
#          Grihya Sutras (Paraskara, Gobhila), BPHS Ch. 55
#
# The 108 aksharas (syllables) are the foundational table for Hindu naming.
# Each of the 27 nakshatras has 4 padas (quarters), yielding 27×4=108 syllables.
# A child's name traditionally begins with the syllable of their birth pada.

# ── 108-syllable table ─────────────────────────────────────────────────────
# nakshatra_index: 0-based (matches NAKSHATRAS list in constants.py)
# lord: nakshatra lord (Vimshottari sequence)
# rashi: sign where this nakshatra falls (primary sign for multi-sign nakshatras)
# padas: list of 4 objects, each with:
#   syllable: primary transliterated syllable (Roman)
#   devanagari: syllable in Devanagari
#   alternates: regional/textual variants
#   rashi: which rashi this pada falls in (Navamsha Rashi)

aksharas:
  - nakshatra: Ashwini
    nakshatra_index: 0
    lord: Ketu
    rashi: Mesha
    padas:
      - pada: 1
        syllable: "Chu"
        devanagari: "चू"
        alternates: ["Cho", "Chu"]
        navamsha_rashi: Mesha
      - pada: 2
        syllable: "Che"
        devanagari: "चे"
        alternates: ["Chhe"]
        navamsha_rashi: Vrishabha
      - pada: 3
        syllable: "Cho"
        devanagari: "चो"
        alternates: []
        navamsha_rashi: Mithuna
