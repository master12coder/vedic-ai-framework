nakshatras:

  # ---------------------------------------------------------------------------
  # 1. ASHWINI
  # ---------------------------------------------------------------------------
  - number: 1
    name_en: Ashwini
    name_hi: अश्विनी
    span:
      start: "0°00' Aries"
      end: "13°20' Aries"
      start_degrees: 0.0
      end_degrees: 13.3333
    lord: Ketu
    deity: Ashwini Kumaras (Divine Physicians / Twin Horsemen)
    symbol: Horse's head
    gana: Deva
    nature: Kshipra (Swift / Light)
    animal: Male Horse
    element: Earth
    body_part: Knees, top of the feet
    psychological_profile: >
      Ashwini natives are energetic initiators with a natural healing instinct and a love of speed.
      They are courageous, independent, and restless, often pioneering new ventures with child-like
      enthusiasm. Their impatience can lead to incomplete projects, but their innate optimism and
      vitality make them natural first-responders in any crisis.
    nadi: Aadi
    varna: Kshatriya
    gender: Male
    direction: East
    padas:
      - pada: 1
        navamsha_sign: Aries
        degree_range: "0°00' - 3°20'"
        syllable: "Chu"
      - pada: 2
        navamsha_sign: Taurus
        degree_range: "3°20' - 6°40'"
