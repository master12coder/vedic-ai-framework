# ── Contraindication pairs ──────────────────────────────────────────────────
# Stones from enemy planetary pairs should NEVER be worn simultaneously
contraindication_pairs:
  - planets: [Sun, Saturn]
    stones: [Ruby, Blue Sapphire]
    severity: absolute
    reason: >
      Sun and Saturn are bitter natural enemies. Wearing Ruby and Blue Sapphire
      together creates internal conflict — the solar energy and saturnine energy
      directly oppose each other, leading to confusion, health issues, and blocked
      outcomes. This is the most dangerous combination in gem therapy.

  - planets: [Moon, Rahu]
    stones: [Pearl, Hessonite]
    severity: absolute
    reason: >
      Rahu causes solar and lunar eclipses — it literally eclipses the Moon.
      Pearl and Hessonite together create extreme mental agitation, emotional
      instability, and can worsen psychological conditions. Never combine.

  - planets: [Moon, Ketu]
    stones: [Pearl, "Cat's Eye"]
    severity: high
    reason: >
      Ketu is the south node and represents the tail that cuts. Combined with
      Moon (Pearl), Cat's Eye creates detachment from emotional grounding and
      can cause sudden disorientation.

  - planets: [Sun, Venus]
    stones: [Ruby, Diamond]
    severity: moderate
    reason: >
      Sun and Venus are natural enemies. Ruby and Diamond together can create
      conflict between ego/authority (Sun) and pleasure/relationships (Venus).
      Some traditions allow this combination if both planets are well-placed.

  - planets: [Jupiter, Mercury]
    stones: [Yellow Sapphire, Emerald]
    severity: moderate
    reason: >
      Jupiter and Mercury are natural enemies. This combination creates conflict
      between expansive Jupiter wisdom and analytical Mercury intellect. Generally
      avoid, though some texts permit if both are functionally benefic for the lagna.

  - planets: [Jupiter, Venus]
    stones: [Yellow Sapphire, Diamond]
    severity: moderate
    reason: >
      Jupiter and Venus are natural enemies — both are "gurus" (Jupiter of gods,
      Venus of demons) in Vedic mythology. Wearing together creates subtle
      philosophical and lifestyle conflicts. Avoid unless both are yogakarakas.

  - planets: [Mars, Mercury]
    stones: [Red Coral, Emerald]
    severity: low
    reason: >
      Mars and Mercury are neutral to mild enemies. Some traditions advise against
      this combination, others permit it. Assess individually based on lagna.
      The conflict is primarily intellectual vs. active energy.

  - planets: [Saturn, Sun]
    stones: [Blue Sapphire, Ruby]
    severity: absolute
    reason: >
      Duplicate entry for Sun-Saturn conflict (Saturn perspective). Same absolute
      prohibition as above.

# ── Favorable tithis for gem wearing ────────────────────────────────────────
# Based on Muhurta Chintamani and traditional gem therapy texts
favorable_tithis:
  indices: [1, 2, 3, 5, 6, 7, 10, 11, 12, 13]  # 1-indexed tithi numbers
  names:
    - Pratipada (1st)
    - Dwitiya (2nd)
    - Tritiya (3rd)
    - Panchami (5th)
    - Shashthi (6th)
    - Saptami (7th)
    - Dashami (10th)
    - Ekadashi (11th)
    - Dwadashi (12th)
    - Trayodashi (13th)

unfavorable_tithis:
  indices: [4, 8, 14, 15, 29]  # 0-indexed in panchang
  names:
    - Chaturthi (4th) — Rikta (empty)
    - Ashtami (8th) — Rikta
    - Chaturdashi (14th) — Rikta
    - Purnima (15th) — intense, avoid gems requiring calm energy
    - Amavasya (30th) — no lunar energy, avoid

