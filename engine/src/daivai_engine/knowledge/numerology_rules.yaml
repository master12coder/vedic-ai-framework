# ── Compound number meanings (Chaldean, 10–52) ───────────────────────────────
# Source: Cheiro "Book of Numbers"; Bhojraj Dwivedi "Anka Jyotish".
# 'nature': favorable / cautionary / mixed

compound_numbers:
  10: {name: "The Wheel of Fortune", nature: favorable, meaning: "Rises to prominence; associated with honor and recognition. Success that comes in cycles."}
  11: {name: "A Lion Muzzled", nature: cautionary, meaning: "Hidden danger; risk of betrayal. Associated with treachery from trusted ones. Needs constant vigilance."}
  12: {name: "The Sacrifice", nature: cautionary, meaning: "The victim; self-sacrifice for others. May feel exploited. Spiritual growth through suffering."}
  13: {name: "The Reaper", nature: mixed, meaning: "Change and transformation. Not evil — signifies upheaval that leads to renewal. Great power if used wisely."}
  14: {name: "Movement and Combination", nature: favorable, meaning: "Adventure, travel, speculation. Success through partnerships. Guard against overindulgence."}
  15: {name: "The Magician", nature: favorable, meaning: "Magic and eloquence. Gifted communicator. Worldly success through persuasion. Can use power for good or ill."}
  16: {name: "The Shattered Citadel", nature: cautionary, meaning: "Pride goes before a fall. Danger of self-destruction. Spiritual transformation through worldly loss."}
  17: {name: "The Star of the Magi", nature: favorable, meaning: "Immortality of name and fame. Spiritual influence. The person's name lives on after death."}
  18: {name: "The Materialism of Matter", nature: cautionary, meaning: "Conflict between material and spiritual. Deception and bitter quarrels. Needs higher purpose."}
  19: {name: "The Successful Prince", nature: favorable, meaning: "Success, happiness, and fulfillment. Shines brightly. Combines power of 1 (Sun) and 9 (Mars)."}
  20: {name: "The Awakening", nature: mixed, meaning: "New purpose and awakening. Delay before recognition. Success comes eventually with patience."}
