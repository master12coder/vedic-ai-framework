# ── Devanagari (Hindi) letter values (Vedic Akshar Anka system) ───────────────
# Source: Bhojraj Dwivedi "Anka Jyotish", phonetic grouping of Sanskrit aksharas.
# Each character is listed using its Unicode representation.
# Vowels (Swar): mapped by fundamental sound vibration.
# Consonants (Vyanjan): mapped by phonetic class (varga).

devanagari_values:
  # Vowels (swar)
  "अ": 1   # a
  "आ": 1   # aa
  "इ": 1   # i
  "ई": 1   # ii
  "उ": 6   # u
  "ऊ": 6   # uu
  "ए": 5   # e
  "ऐ": 5   # ai
  "ओ": 7   # o
  "औ": 7   # au
  "ऋ": 2   # ri (vocalic r)
  "अं": 1  # anusvara (nasalized a)
  "अः": 1  # visarga

  # Ka-varga (क-वर्ग): velar consonants
  "क": 2   # ka
  "ख": 2   # kha
  "ग": 3   # ga
  "घ": 3   # gha
  "ङ": 5   # nga

  # Cha-varga (च-वर्ग): palatal consonants
  "च": 6   # cha
  "छ": 6   # chha
  "ज": 1   # ja
  "झ": 1   # jha
  "ञ": 5   # nya

  # Ta-varga (ट-वर्ग): retroflex consonants
  "ट": 4   # ṭa
  "ठ": 4   # ṭha
  "ड": 4   # ḍa
  "ढ": 4   # ḍha
  "ण": 5   # ṇa

  # Ta-varga (त-वर्ग): dental consonants
  "त": 4   # ta
  "थ": 4   # tha
  "द": 4   # da
  "ध": 4   # dha
  "न": 5   # na

  # Pa-varga (प-वर्ग): labial consonants
  "प": 8   # pa
  "फ": 8   # pha
  "ब": 2   # ba
  "भ": 2   # bha
  "म": 4   # ma

  # Semi-vowels and sibilants (antastha / ushma)
  "य": 1   # ya
  "र": 2   # ra
  "ल": 3   # la
  "व": 6   # va
  "श": 5   # sha (palatal sibilant)
  "ष": 5   # ṣha (retroflex sibilant)
  "स": 3   # sa (dental sibilant)
  "ह": 5   # ha

  # Nukta consonants (Hindi-specific)
  "ड़": 4  # ṛa
  "ढ़": 4  # ṛha
  "ज़": 1  # za
  "फ़": 8  # fa

# ── Lo Shu grid — fixed number positions in the 3×3 grid ─────────────────────
# The Lo Shu magic square arrangement. Each number occupies a fixed cell.
# grid[row][col] position — 0-indexed, row 0 is top.
#
#   4  9  2     row 0: [4, 9, 2]
#   3  5  7     row 1: [3, 5, 7]
#   8  1  6     row 2: [8, 1, 6]

loshu_grid_layout:
  - [4, 9, 2]
  - [3, 5, 7]
  - [8, 1, 6]

loshu_positions:
  1: [2, 1]   # row 2, col 1
  2: [0, 2]   # row 0, col 2
  3: [1, 0]   # row 1, col 0
  4: [0, 0]   # row 0, col 0
  5: [1, 1]   # row 1, col 1 (center)
  6: [2, 2]   # row 2, col 2
  7: [1, 2]   # row 1, col 2
  8: [2, 0]   # row 2, col 0
  9: [0, 1]   # row 0, col 1

