        result: "Success over enemies, courage, valour, short journeys"
        note: "One of Saturn's good transit positions"
      4:
        favorability: unfavorable
        score: -1
        result: "Mental distress, property issues, mother's health affected"
      5:
        favorability: unfavorable
        score: -1
        result: "Children issues, stomach problems, loss of intelligence"
      6:
        favorability: favorable
        score: +1
        result: "Victory over enemies, good health, recovery from illness"
        note: "Good Saturn transit — enemies subdued"
      7:
        favorability: unfavorable
        score: -1
        result: "Travel, relationship strain, spouse health issues"
        vedha: none
      8:
        favorability: very_unfavorable
        score: -2
        result: "Health crises, major losses, accidents, danger of death"
        note: "Very malefic — Saturn in 8th from Moon"
      9:
        favorability: unfavorable
        score: -1
        result: "Obstacles in fortune, father's health, loss of dharma"
      10:
        favorability: unfavorable
        score: -1
        result: "Career setbacks, public humiliation, loss of status"
        note: "Kantak Shani — Saturn in 10th from Moon"
      11:
        favorability: very_favorable
        score: +2
        result: "Gains, prosperity, fulfillment of desires, income increase"
        note: "Saturn's best transit position — no vedha for 11th house"
        vedha: none
      12:
        favorability: unfavorable
        score: -1
        result: "Expenses, losses, foreign travel, sleep disturbances"
        note: "Part of Sade Sati — rising phase"

