# ═══════════════════════════════════════════════════════════════
# GOCHARA (TRANSIT) RULES — Results by House from Natal Moon
# ═══════════════════════════════════════════════════════════════
# Source: Phaladeepika Ch.26, BPHS Transit Chapter, Jataka Parijata
# Confidence: canonical
#
# Rules describe transit results for each planet passing through
# houses 1-12 counted from the natal Moon sign.
#
# Favorability scale:
#   very_favorable  (+2) : Strong positive results
#   favorable       (+1) : Positive results
#   neutral          (0) : Mixed / no strong effect
#   unfavorable     (-1) : Negative results
#   very_unfavorable(-2) : Strong negative results
#
# VEDHA: Houses 7 and 11 have NO vedha — beneficial effects always active.
# Vedha pairs: 1↔5, 2↔12, 3↔9, 4↔10, 6↔8
# ═══════════════════════════════════════════════════════════════

source: "Phaladeepika Ch.26, BPHS transit chapter"
confidence: canonical

# Ashtakavarga-based score modifier (applied on top of gochara result):
ashtakavarga_scoring:
  thresholds:
    - bindus: [0, 1]  score_modifier: -2  label: "Very unfavorable"
    - bindus: [2, 3]  score_modifier: -1  label: "Unfavorable"
    - bindus: [4, 4]  score_modifier:  0  label: "Neutral"
    - bindus: [5, 6]  score_modifier: +1  label: "Favorable"
    - bindus: [7, 8]  score_modifier: +2  label: "Very favorable"
  note: >
    When Vedha is active, the beneficial transit effect is nullified
    (score forced to 0 regardless of bindu count). Malefic effects
    from vedha are not blocked.

planets:

  # ── Saturn ──────────────────────────────────────────────────────────────
  # Saturn transit is most impactful of all planets.
  # Sade Sati (12th/1st/2nd from Moon) = 7.5-year affliction period.
  # Saturn's own signs (Capricorn/Aquarius) and exaltation (Libra)
  # reduce the malefic effects even in unfavorable houses.
  Saturn:
    source: "Phaladeepika Ch.26 v1-12"
    houses:
      1:
        favorability: unfavorable
        score: -1
        result: "Obstacles, health issues, mental distress, loss of position"
        note: "Part of Sade Sati — peak phase when Saturn crosses Moon sign"
      2:
        favorability: unfavorable
        score: -1
        result: "Financial strain, family disputes, speech problems"
        note: "Part of Sade Sati — setting phase"
      3:
        favorability: favorable
