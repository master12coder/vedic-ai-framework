# ── Vedha Pairs ──────────────────────────────────────────────────────────────
# When a planet transits a favorable house, another planet in the vedha house
# cancels the beneficial effect (result becomes neutral, score = 0).
# Malefic transits are NOT blocked by vedha.
# Houses 7 and 11 have NO vedha — benefits always active.
vedha_pairs:
  source: "Phaladeepika transit chapter"
  pairs:
    - houses: [1, 5]   description: "1st and 5th obstruct each other"
    - houses: [2, 12]  description: "2nd and 12th obstruct each other"
    - houses: [3, 9]   description: "3rd and 9th obstruct each other"
    - houses: [4, 10]  description: "4th and 10th obstruct each other"
    - houses: [6, 8]   description: "6th and 8th obstruct each other"
  no_vedha: [7, 11]
  note: >
    Vedha applies to NATAL planet positions, not transiting planets.
    If a natal planet sits in the vedha house of the transiting planet's
    favorable house, the benefit is cancelled.
