# ── Ingress Chart Ruling Planets ─────────────────────────────────────────────

ingress_ruling_planets:
  # Planet ruling each day determines the year lord for Mesha Sankranti
  Sunday: "Sun"
  Monday: "Moon"
  Tuesday: "Mars"
  Wednesday: "Mercury"
  Thursday: "Jupiter"
  Friday: "Venus"
  Saturday: "Saturn"

  # Effects when that planet rules the ingress year
  Sun:
    - "Government authority strong"
    - "Rise of leaders, kings, executives"
    - "Economic growth driven by government"
  Moon:
    - "Public welfare focus"
    - "Agriculture and rainfall favorable"
    - "Women gain prominence"
  Mars:
    - "Military conflicts, wars"
    - "Fire accidents, violence"
    - "Strong executive action"
  Mercury:
    - "Trade and communication boom"
    - "Technology growth"
    - "Intellectual and educational advancement"
  Jupiter:
    - "Overall prosperity"
    - "Religious harmony"
    - "Judicial fairness"
    - "Good rainfall and crops"
  Venus:
    - "Arts and culture flourish"
    - "Diplomatic successes"
    - "Economic prosperity"
    - "Entertainment industry growth"
  Saturn:
    - "Hardship, austerity measures"
    - "Labor unrest, strikes"
    - "Slow economic growth"
    - "Infrastructure development"
