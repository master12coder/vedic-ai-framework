# ── 4. VEDHA (OBSTRUCTION) PAIRS ─────────────────────────────────────────────
# When a planet transits a BENEFICIAL house, another planet in the VEDHA house
# cancels the good result (score reset to 0).
# Vedha applies to NATAL planet positions (not transit positions).
# MALEFIC transits are NEVER blocked by vedha.
# Source: Phaladeepika transit chapter
vedha_pairs:
  # house: its_vedha_counterpart
  1: 5
  5: 1
  2: 12
  12: 2
  3: 9
  9: 3
  4: 10
  10: 4
  6: 8
  8: 6
no_vedha_houses: [7, 11]
vedha_note: >
  Houses 7 and 11 have NO vedha — beneficial effects are always active.
  Vedha is checked using natal chart positions, not transit positions.
  The Sun and Moon are NEVER subject to vedha blocking each other.

# ── 5. MOORTHY NIRNAYA ───────────────────────────────────────────────────────
# Classification of transit quality based on BAV (Bhinna Ashtakavarga) bindu count
# for the transiting planet in the transit sign.
# Source: Phaladeepika, Mantreswara tradition
moorthy_nirnaya:
  poorna:
    bindus_min: 5
    bindus_max: 8
    label: "Poorna"
    label_hi: "पूर्ण"
    label_en: "Full"
    meaning: "Full benefit — transit results manifest completely"
    metal: "Swarna (Gold)"
  madhya:
    bindus_min: 3
    bindus_max: 4
    label: "Madhya"
    label_hi: "मध्य"
    label_en: "Medium"
    meaning: "Partial benefit — transit results manifest moderately"
    metal: "Rajata (Silver)"
  swalpa:
    bindus_min: 1
    bindus_max: 2
    label: "Swalpa"
    label_hi: "स्वल्प"
    label_en: "Minimal"
    meaning: "Minimal benefit — transit results barely manifest"
    metal: "Tamra (Copper)"
  nishphala:
    bindus_min: 0
    bindus_max: 0
    label: "Nishphala"
    label_hi: "निष्फल"
    label_en: "Fruitless"
    meaning: "No result — transit is completely ineffective"
    metal: "Loha (Iron)"

# ── 6. TRANSIT DURATIONS ─────────────────────────────────────────────────────
