  strength_factors:
    - "Jupiter + Venus in 6/7/8 from Moon: most powerful Madhya (wisdom + beauty)"
    - "Jupiter + Mercury: learning and wisdom combination is highly favorable"
    - "Venus + Mercury: arts and commerce combination gives prosperity"
