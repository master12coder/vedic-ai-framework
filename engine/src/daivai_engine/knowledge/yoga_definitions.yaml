sanyasi_yoga:
  name_en: "Sanyasi Yoga (Complete Renunciation Yoga)"
  name_hi: "संन्यासी योग"
  type: "mixed"
  formation:
    condition: "Four or more planets are placed in a single house (sign), AND the Lagna lord is aspected by Saturn without any benefic (Jupiter, Venus, Mercury) aspect on the Lagna or Lagna lord. The massive stellium in one sign creates renunciation energy, and Saturn's aspect on the Lagna lord without benefic relief indicates worldly detachment."
    planets: ["saturn"]
    houses_required: []
    sign_condition: "four_plus_planets_one_sign_saturn_aspects_lagna_lord"
  cancellation:
    - "Jupiter aspects the Lagna lord, providing benefic influence that maintains worldly engagement"
    - "Venus is in the 1st or 7th house, indicating strong attachment to worldly pleasures"
    - "The multiple-planet concentration is in a kendra house — worldly power indicated instead"
    - "Moon is strong (full) and in a kendra — emotional engagement with the world maintained"
  effects:
    general: "The native is drawn to renunciation, spiritual life, and detachment from worldly affairs. This yoga indicates a soul that has accumulated sufficient worldly experience to seek the transcendent. The native may formally take up sanyasa (monastic vows), or live as a householder with a renunciate inner orientation, unattached to outcomes."
    spiritual: "Deep and genuine spiritual vocation. The native is suited for the path of jnana (knowledge), bhakti (devotion), or karma yoga (selfless action) — all paths of renunciation from the fruits of action."
  strength_factors:
    - "Strongest when the stellium includes the Lagna lord, Sun, and Moon"
    - "Enhanced when Jupiter is in the stellium — sattvic renunciation rather than tamasic withdrawal"
    - "More pronounced when the stellium falls in the 12th house (liberation) or 9th house (dharma)"
    - "Saturn in the 10th aspecting the Lagna lord is particularly powerful for this yoga"
  source: "BPHS chapter 79 — Sanyasa yogas; Phaladeepika chapter 27"
  confidence: "high"

vishnu_yoga:
  name_en: "Vishnu Yoga (Sustainer's Yoga)"
  name_hi: "विष्णु योग"
  type: "benefic"
  formation:
    condition: "Jupiter is in the 9th house (dharma/bhagya), Venus is in the 2nd house (dhana), and Mercury is in the 10th house (karma). Alternatively: Jupiter, the Moon, and Venus form a trine relationship with each other while simultaneously aspecting the 5th house (Vishnu's seat of children and wisdom). The combination of dharma (Jupiter), beauty (Venus), and intelligence (Mercury/Moon) in these specific houses."
    planets: ["jupiter", "venus", "mercury"]
    houses_required: [2, 9, 10]
    sign_condition: "specific_house_placement"
  cancellation:
    - "Any of the three planets is debilitated or severely afflicted"
    - "Malefics (Mars, Saturn, Rahu) occupy the 5th house, blocking Vishnu's seat"
    - "The Lagna lord is in a dusthana, weakening the overall chart foundation"
  effects:
    general: "Named after Lord Vishnu, the sustainer of the universe, this yoga creates a person who preserves, nurtures, and maintains — institutions, relationships, knowledge, and dharma. The native is righteous, protective, wealthy, and devoted to preserving sacred traditions. They are natural leaders who sustain rather than destroy."
    career: "Success in preservation-oriented fields: heritage, law, governance, religious institutions, conservation, medicine, and administrative leadership. The native maintains what others build."
    finance: "Sustained and growing wealth. The native is excellent at preserving and growing inherited or accumulated wealth."
    spiritual: "Deep connection to dharma and the sustaining principles of creation. The native is devoted to Vishnu or Vishnu-aspect deities."
  strength_factors:
    - "Strongest when Jupiter is exalted in Cancer (9th house for Scorpio lagna)"
    - "Enhanced when Venus is in Taurus or Libra (own sign) in the 2nd"
    - "Amplified when Mercury is exalted in Virgo in the 10th"
    - "More powerful when the Moon is also strong and in trine with Jupiter"
  source: "Classical Vedic texts; Vishnu references in Hora Sara and Jataka Parijata"
  confidence: "medium"

shiva_yoga:
  name_en: "Shiva Yoga (Transformer's Yoga)"
  name_hi: "शिव योग"
  type: "benefic"
  formation:
    condition: "Jupiter is in the 5th house (place of divine intelligence and mantras), Moon is in the 9th house (dharma and guru), and Sun is in the 10th house (karma and worldly authority). Alternatively, the Sun-Moon combination creates consciousness in the dharma/karma axis while Jupiter activates the 5th house of spiritual practice."
    planets: ["jupiter", "moon", "sun"]
    houses_required: [5, 9, 10]
    sign_condition: "specific_house_placement_sun_moon_jupiter"
  cancellation:
    - "Jupiter in the 5th is afflicted by Rahu or Ketu (eclipse of wisdom)"
    - "Sun is in an enemy sign in the 10th, weakening authority"
    - "Moon in the 9th is in its debilitation sign (Scorpio) — dharma weakened"
  effects:
    general: "Named after Lord Shiva, the transformer and destroyer-recreator, this yoga creates a person of profound spiritual depth who can transform themselves and others. The native undergoes significant personal transformations, has mastery over mantra and spiritual disciplines, and commands authority through spiritual power rather than worldly position alone."
    spiritual: "Mastery in spiritual practice, mantra, tantra, or meditation. The native is drawn to Shaivism, Shaktism, or transformative spiritual paths. Potential for spiritual powers (siddhis)."
    career: "Authority in spiritual leadership, healing, transformative arts, surgery, or any field requiring deep mastery and transformative capability."
  strength_factors:
    - "Strongest when Sun is exalted in Aries in the 10th (for Cancer lagna)"
    - "Enhanced when Jupiter is in Sagittarius or Pisces in the 5th"
    - "Amplified when Moon is strong (Shukla Paksha) in the 9th"
    - "Most powerful when Shiva nakshatras (Ardra, Swati, Shatabhisha) are highlighted"
  source: "Classical Vedic texts; Shiva yoga references in Jataka Parijata and Saravali"
  confidence: "medium"

tapasvi_yoga:
  name_en: "Tapasvi Yoga (Ascetic's Yoga)"
  name_hi: "तपस्वी योग"
  type: "mixed"
  formation:
    condition: "Saturn is strongly placed in the 9th house (dharma/tapas) AND the 5th and 9th lords are conjunct or mutually aspecting each other in a kendra or trikona. Saturn in the 9th creates severe discipline and tapasya orientation, while the 5th-9th lord connection links past-life merit with current dharmic focus."
    planets: ["saturn"]
    houses_required: [9]
    sign_condition: "saturn_in_9th_with_5th_9th_lord_connection"
  cancellation:
    - "Saturn in the 9th is conjunct Rahu — transforms tapasya into worldly ambition"
    - "Venus strongly aspects the 9th house — worldly pleasures undermine ascetic focus"
    - "The 5th lord is in a dusthana without relief — past merit undermined"
  effects:
    general: "The native is drawn to severe austerities, discipline, and purification practices. They may become renowned for their endurance, self-control, and capacity for sustained spiritual effort. This yoga often indicates a person who achieves great spiritual merit through disciplined practice, even if it means social hardship or solitude."
    spiritual: "Exceptional capacity for tapas (austerities), mantra japa, fasting, and sustained meditation. The native may achieve spiritual powers through disciplined practice."
    health: "The native's physical constitution is tested by their own austerities — they may appear thin or ascetic but possess remarkable inner endurance."
  strength_factors:
    - "Stronger when Saturn is exalted in Libra in the 9th"
    - "Enhanced when Ketu also aspects or conjoins the 9th house"
    - "More powerful when the lagna lord is also in the 9th (complete dharmic orientation)"
    - "Amplified during Saturn's mahadasha or Ketu's mahadasha"
  source: "Phaladeepika chapter 27; Saravali on Saturn in 9th; classical tapas yoga references"
  confidence: "medium"

parivraja_yoga_10th_12th:
  name_en: "Parivraja Yoga — 10th Lord in 12th"
  name_hi: "परिव्राजक योग — दशमेश द्वादश में"
  type: "mixed"
  formation:
    condition: "The lord of the 10th house (karma/action/career) is placed in the 12th house (moksha/liberation/foreign lands) AND Saturn aspects either the 10th lord, the 10th house, or the Lagna. The movement of the action house lord to the liberation house indicates that the native's worldly action is oriented toward transcendence, foreign service, or renunciation."
    planets: ["saturn"]
    houses_required: [10, 12]
    sign_condition: "10th_lord_in_12th_with_saturn_aspect"
  cancellation:
    - "Venus is strongly placed in the 10th house — worldly career maintained"
    - "The 10th lord in the 12th is exalted — may indicate foreign success rather than renunciation"
    - "Jupiter aspects the 10th lord in the 12th from a benefic position"
  effects:
    general: "The native's life work (10th) flows toward liberation, foreign lands, or spiritual service (12th). This can manifest as service in ashrams, foreign missions, hospitals, prisons, or other 12th house institutions. The native's career is oriented toward helping those who are hidden from society. Saturn's influence intensifies the sacrificial quality of the work."
    career: "Success in areas connected to the 12th house: foreign countries, hospitals, retreat centers, religious institutions, or behind-the-scenes work. The native may work abroad or in service-oriented professions."
    spiritual: "Strong spiritual orientation to work. The native finds dharma in selfless service rather than in worldly achievement."
  strength_factors:
    - "Stronger when Saturn aspects both the 10th and 12th houses"
    - "Enhanced when the 12th lord is also in a dharmic position (5th or 9th)"
    - "More pronounced when Ketu also influences the 10th house or its lord"
    - "Amplified during the dasha of the 10th lord or Saturn"
  source: "BPHS chapter 79; Parivraja yoga conditions from classical texts"
  confidence: "medium"

diksha_yoga:
  name_en: "Diksha Yoga (Spiritual Initiation Yoga)"
  name_hi: "दीक्षा योग"
  type: "benefic"
  formation:
    condition: "Ketu is in the 1st or 5th house AND Jupiter aspects Ketu or the house Ketu occupies. Ketu in the lagna or 5th house (with Jupiter's grace) indicates a soul that has received spiritual diksha (initiation) in a past life and carries that samskara forward. The combination of Ketu's past-life attainment and Jupiter's blessings creates a naturally initiated soul."
    planets: ["ketu", "jupiter"]
    houses_required: [1, 5]
    sign_condition: "ketu_in_1st_or_5th_with_jupiter_aspect"
  cancellation:
    - "Rahu is conjunct Jupiter, corrupting the guru energy with worldly desires"
    - "Saturn is also in the 1st house with Ketu — delays initiation through worldly karma"
    - "The 5th lord is in a dusthana, weakening past-life merit activation"
  effects:
    general: "The native is a natural spiritual seeker who responds quickly and deeply to spiritual teachers and practices. They may receive formal initiation (diksha) early in life, or find a guru spontaneously. Past-life spiritual merit (Ketu) is activated by Jupiter's grace, making the spiritual path feel natural and familiar rather than foreign."
    spiritual: "Natural capacity for meditation, mantra, and spiritual practice. The native is drawn to initiation-based spiritual traditions (tantric, vedantic, or devotional). They are natural disciples who can also become gurus."
  strength_factors:
    - "Strongest when Ketu is in Ketu's own nakshatra (Ashwini, Magha, Mula)"
    - "Enhanced when Jupiter is in a kendra or trikona while aspecting Ketu"
    - "More powerful when the 9th lord is also involved (guru-disciple connection)"
    - "Amplified during Ketu mahadasha with Jupiter antardasha"
  source: "Classical texts on Ketu's spiritual significance; Hora Sara; Jataka Parijata"
  confidence: "medium"

siddha_yoga:
  name_en: "Siddha Yoga (Spiritual Attainment Yoga)"
  name_hi: "सिद्ध योग"
  type: "benefic"
  formation:
    condition: "Jupiter is exalted or in its own sign in the 5th or 9th house AND the 9th lord is also in the 5th or 9th house creating a dharma-trikona connection. The combination of maximum Jupiter strength in the houses of spiritual wisdom creates the Siddha Yoga — potential for spiritual accomplishment (siddhi)."
    planets: ["jupiter"]
    houses_required: [5, 9]
    sign_condition: "jupiter_exalted_or_own_in_5th_or_9th"
  cancellation:
    - "Rahu conjoins Jupiter, corrupting spiritual energy with desire"
    - "Saturn afflicts the 5th and 9th houses without relief"
    - "The 5th and 9th lords are both in dusthanas — dharmic foundation weakened"
  effects:
    general: "The native has natural spiritual ability, philosophical depth, and the capacity for spiritual accomplishment. In classical usage, siddhi refers to special abilities arising from advanced spiritual practice. The native is a natural teacher, guru, or spiritual authority who achieves recognition for their depth of knowledge and realization."
    spiritual: "Exceptional spiritual gifts — the native may develop siddhis (powers) through practice, or simply be recognized as a realized being. Deep connection to guru lineage and wisdom traditions."
    career: "Success in teaching, spiritual guidance, philosophy, law, or any field requiring the highest level of knowledge and ethical authority."
  strength_factors:
    - "Strongest when Jupiter is exalted in Cancer in the 5th (for Pisces lagna) or 9th"
    - "Enhanced when the Moon is also strong in the 5th or 9th"
    - "More powerful when Vargottama Jupiter is in the Rashi and Navamsha"
    - "Amplified when the 9th lord and 5th lord are both exalted or in own signs"
  source: "Classical Vedic texts on siddha yoga; Jataka Parijata; Saravali"
  confidence: "medium"

mumuksha_yoga:
  name_en: "Mumuksha Yoga (Desire for Liberation Yoga)"
  name_hi: "मुमुक्षु योग"
  type: "mixed"
  formation:
    condition: "Ketu and Saturn together aspect or conjunct the Moon AND the 12th lord is in the 1st house or 5th house, indicating that the desire for liberation (mumuksha) has become the primary orientation of the soul. The Moon (mind) under Ketu (detachment) and Saturn (renunciation) combined with the liberation house lord's placement creates a consciousness oriented toward moksha."
    planets: ["ketu", "saturn", "moon"]
    houses_required: [1, 5, 12]
    sign_condition: "ketu_saturn_influence_on_moon_with_12th_lord_connection"
  cancellation:
    - "Venus strongly aspects or conjoins the Moon — worldly desire maintained"
    - "The 12th lord is in a dusthana or debilitated — liberation house weakened"
    - "Rahu also aspects Moon — adds worldly obsession that counteracts the liberation orientation"
  effects:
    general: "The native's deepest motivation is liberation from the cycle of rebirth. They may not always recognize this intellectually, but their actions reflect a soul that is growing weary of worldly engagement and seeking transcendence. This yoga often produces mystics, sages, or deeply spiritual individuals who eventually withdraw from worldly life."
    spiritual: "Authentic spiritual longing for liberation (moksha). The native may achieve liberation in this or future lifetimes. They are drawn to traditions that emphasize jnana (knowledge) or advaita (non-duality)."
