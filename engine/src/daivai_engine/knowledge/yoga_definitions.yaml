    planets: ["sun", "saturn", "rahu"]
    houses_required: [9]
    sign_condition: "sun_afflicted_in_9th_or_9th_lord_debilitated_with_saturn_influence"
  cancellation:
    - "Jupiter strongly aspects the 9th house or 9th lord — ancestral blessings restored"
    - "The Sun is in its own sign (Leo) or exalted (Aries) in the 9th — ancestral strength"
    - "Strong 9th lord in a kendra or trikona despite minor affliction"
  effects:
    general: "The native carries karma from paternal ancestors that creates obstacles in their dharmic path. This may manifest as father-related challenges, difficulty with authority figures (who represent the father archetype), blocked opportunities that seem inexplicable, or recurring patterns of effort without proportionate reward. The native is advised to perform ancestral rites (Pitru Tarpan, Shraddha ceremonies) to resolve this karma."
    career: "Career may be blocked by hidden obstacles, authority conflicts, or government-related difficulties that trace to ancestral karma."
    spiritual: "Strong pull toward ancestral propitiation, Pitru Puja, and resolving family karma. The native benefits greatly from these practices."
  strength_factors:
    - "Most intense when Sun is debilitated in Libra in the 9th with Saturn and Rahu"
    - "More severe when the native's father also had a difficult chart (generational karma)"
    - "Mitigated when the native sincerely performs Pitru Tarpan on Amavasya"
    - "Intensified during Sun mahadasha or Rahu mahadasha"
  source: "Classical texts on ancestral karma; BPHS Arishta chapter; Saravali"
  confidence: "medium"

balarishta_moon_malefic_kendra:
  name_en: "Balarishta — Moon with Malefic in Kendra"
  name_hi: "बालारिष्ट — केन्द्र में चन्द्र के साथ पापग्रह"
  type: "malefic"
  formation:
    condition: "The Moon is in a kendra house (1st, 4th, 7th, or 10th) and is conjoined with or severely aspected by natural malefics (Saturn, Mars, or Rahu/Ketu) WITHOUT any benefic (Jupiter, Venus) aspect on the Moon. The Moon in a kendra (prominent position) under full malefic assault without protection indicates early life vulnerability."
    planets: ["moon"]
    houses_required: [1, 4, 7, 10]
    sign_condition: "moon_in_kendra_with_malefic_no_benefic"
  cancellation:
    - "Jupiter aspects the Moon from any kendra or trikona — protection from danger"
    - "Venus aspects the Moon — emotional protection and nourishment"
    - "Moon is waxing (Shukla Paksha) and bright — natural strength resists malefic"
    - "Strong Lagna lord compensates for Moon's affliction"
  effects:
    general: "Classical texts describe Balarishta as an early life threat indicator. Moon in a kendra (exposed, prominent position) under malefic attack creates vulnerability in the first years of life (particularly the first 3-12 years). If this yoga is sufficiently cancelled, the native survives but may face early health challenges or separation from the mother. Classical remedies include Janamakshatra puja and Moon-strengthening rituals."
    health: "Early childhood health challenges. The mother's health may also be affected. Emotional and psychological vulnerability in early years."
    family: "Possible early separation from or challenges related to the mother. The native may be raised with emotional instability in early childhood."
  strength_factors:
    - "Most severe when Moon is also waning (Krishna Paksha) or near Amavasya"
    - "Intensified when Moon is debilitated in Scorpio with malefic influence"
    - "Most dangerous when the malefic is Rahu or Ketu in a Gandanta degree"
    - "Significantly reduced when Jupiter aspects Moon — Jupiter's aspect on Moon is the best Balarishta cancellation"
  source: "BPHS chapter 40 — Arishta Adhyaya; Brihat Jataka chapter 7"
  confidence: "high"

yogini_dasha_mrityu:
  name_en: "Yogini Dasha Mrityu Indicators"
  name_hi: "योगिनी दशा मृत्यु संकेत"
  type: "malefic"
  formation:
    condition: "The Mangala (Mars) Yogini Dasha period coincides with the native's chart having Mars in the 8th house from its natal position, AND the 8th lord is in a maraka position (2nd or 7th) in the transit chart. Additionally, Saturn transiting the 8th from Moon during Mangala Yogini Dasha intensifies the death indicator. Per classical Yogini Dasha rules, each Yogini has specific maraka potential."
    planets: ["mars", "saturn"]
    houses_required: [2, 7, 8]
    sign_condition: "yogini_dasha_maraka_transit_combination"
  cancellation:
    - "Jupiter transiting the 1st or 5th from Moon during the Yogini Dasha period"
    - "Benefic aspects on the natal 8th lord during the Dasha period"
    - "Strong Lagna and Lagna lord throughout the Dasha — vitality maintained"
  effects:
    general: "Yogini Dasha is an 8-year cycle Dasha system where each of 8 yoginis (Mangala, Pingala, Dhanya, Bhramari, Bhadrika, Ulka, Siddha, Sankata) rules a period. Classical texts identify specific dangerous periods within Yogini Dasha for health and longevity. The Mangala (1 year) and Ulka (Saturn, 6 years) yoginis are considered most challenging for health crises."
    health: "Health crises or surgeries during specific Yogini Dasha periods. The native should take precautions and not undertake risky activities during these periods."
  strength_factors:
    - "Most dangerous when combined with Vimshottari death indicators in the same period"
    - "Intensified when Rahu or Ketu transit the 1st or 8th houses simultaneously"
    - "Mitigated when Jupiter transits the 1st or 5th from natal Moon"
    - "Requires concurrent malefic transits to be fully activated"
  source: "Classical Yogini Dasha texts; Saravali on Yogini Dasha death indicators"
  confidence: "medium"

madhyayu_longevity:
  name_en: "Madhyayu Yoga — Medium Life Indicators"
  name_hi: "मध्यायु योग — मध्यम आयु संकेत"
  type: "mixed"
  formation:
    condition: "The longevity indicators (Lagna lord, Moon, and 8th lord) are analyzed: if exactly one of the three (Lagna lord, Moon, or 8th lord) is in a dusthana (6th, 8th, 12th) while the others are in kendras or trikonas, the classical formula indicates middle longevity (40-70 years, madhyayu). This is BPHS's three-factor longevity assessment."
    planets: []
    houses_required: [1, 4, 5, 6, 7, 8, 9, 10, 12]
    sign_condition: "one_of_three_longevity_factors_in_dusthana"
  cancellation:
    - "Multiple benefic aspects on the afflicted longevity factor — extends life"
    - "Strong Deerghayu indicators (2 of 3 factors in kendra/trikona) — life extended"
    - "Vargottama longevity factors add substantial strength"
  effects:
    general: "The classical Ayur (longevity) calculation from BPHS indicates middle lifespan when precisely one of the three longevity pillars (Lagna lord, Moon, 8th lord) is weakened while the others are strong. The native typically lives a middle lifespan with the key health challenges concentrated in specific planetary periods."
    health: "Health is generally maintained but with notable challenges during the weakened longevity factor's mahadasha or during malefic transits to that factor."
  strength_factors:
    - "More toward Deerghayu (long life) when the dusthana factor is also in a benefic sign"
    - "More toward Alpayu (short life) when the dusthana factor is also debilitated"
    - "Ayur calculations must consider all three longevity factors together"
    - "Saturn's exact aspects and Rahu/Ketu positions refine the calculation"
  source: "BPHS chapter 44 — Ayur Adhyaya (Longevity Chapter); Saravali chapter 37"
  confidence: "high"


