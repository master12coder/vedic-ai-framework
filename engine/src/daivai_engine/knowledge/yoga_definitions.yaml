  effects:
    general: "The native is a master craftsman, skilled artisan, or technical professional. The union of Mars (manual precision, tools, fire) with Mercury (intelligence, measurement, calculation) creates excellence in any discipline requiring both hand-skill and mental acuity. Traditional crafts, engineering, computer programming, architecture, and sculpture are all potential vocations."
    career: "Engineer, architect, sculptor, goldsmith, chef, surgeon, programmer, carpenter, industrial designer, and any technical-creative profession."
