kemadruma_bhanga_rule1:
  name_en: "Kemadruma Bhanga Rule 1 — Planet Adjacent to Moon"
  name_hi: "केमद्रुम भंग नियम १"
  type: "benefic"
  formation:
    condition: "A planet (other than Sun, Rahu, or Ketu) is placed in the 2nd or 12th house from the Moon's sign. When Moon is flanked by at least one planet, Kemadruma is cancelled."
    planets: ["moon"]
    houses_required: []
  cancellation:
    - "The adjacent planet is Rahu or Ketu — these do not count for cancellation"
    - "Sun is adjacent — classical texts specifically exclude Sun from this cancellation"
  effects:
    general: "The Moon is no longer isolated — it has companionship and support from an adjacent planet. This is the most direct and primary cancellation of Kemadruma. The native's mind and emotional life are supported, not isolated. The nature of the adjacent planet colors the protection: Mars gives courage, Jupiter gives wisdom, Venus gives beauty and happiness."
  source: "BPHS chapter 23 rule 1; Brihat Jataka chapter 8"
  confidence: "high"

kemadruma_bhanga_rule2:
  name_en: "Kemadruma Bhanga Rule 2 — Planet in Kendra from Moon"
  name_hi: "केमद्रुम भंग नियम २"
  type: "benefic"
  formation:
    condition: "A planet (other than Sun, Rahu, Ketu) is placed in a kendra position (1st, 4th, 7th, or 10th) from the Moon's sign. A planet in a strong angular position from Moon provides structural support to the isolated Moon."
    planets: ["moon"]
    houses_required: []
  cancellation:
    - "Only Sun/Rahu/Ketu are in kendra from Moon — these do not qualify"
    - "The kendra planet from Moon is severely afflicted"
  effects:
    general: "A planet in kendra from the Moon gives the isolated Moon a stable foundation. The kendra planet acts as a pillar supporting the Moon's energy from a strong angular position. This is the second most important Kemadruma cancellation rule. The native has external support structures that compensate for the Moon's isolation."
  source: "BPHS chapter 23 rule 2; Phaladeepika chapter 7"
  confidence: "high"

kemadruma_bhanga_rule3:
  name_en: "Kemadruma Bhanga Rule 3 — Moon in Kendra from Lagna"
  name_hi: "केमद्रुम भंग नियम ३"
  type: "benefic"
  formation:
    condition: "The Moon itself is placed in a kendra house (1st, 4th, 7th, or 10th) from the Lagna, even if no planet flanks the Moon in the 2nd or 12th. Moon's placement in the structural pillars of the chart gives it inherent strength that cancels the Kemadruma weakness."
    planets: ["moon"]
    houses_required: [1, 4, 7, 10]
  cancellation:
    - "Moon in the 8th house — while technically a kendra from certain interpretations, the 8th is a dusthana"
    - "Moon in kendra is aspected by multiple malefics simultaneously"
  effects:
    general: "Moon anchored in a kendra house has inherent structural strength — it is placed in one of the four pillars of the chart. This cancels the isolated, floating quality of Kemadruma. The native's mind, while perhaps solitary by nature, has a stable foundation in life."
  source: "BPHS chapter 23 rule 3; Saravali"
  confidence: "high"

kemadruma_bhanga_rule4:
  name_en: "Kemadruma Bhanga Rule 4 — Planet in Kendra from Lagna"
  name_hi: "केमद्रुम भंग नियम ४"
  type: "benefic"
  formation:
    condition: "Any planet (other than Sun, Rahu, Ketu) is placed in a kendra house from the Lagna. The overall strength of the chart's angular houses compensates for the Moon's isolation."
    planets: []
    houses_required: [1, 4, 7, 10]
  cancellation:
    - "Only luminary or nodes in kendra — does not cancel Kemadruma by this rule"
    - "The kendra planet is severely combust or in planetary war defeat"
  effects:
    general: "The presence of strong angular planet(s) gives overall chart strength that protects the native even when the Moon is isolated. The native may have an introverted or solitary emotional nature (Moon's isolation) but has external competence and structure in life (kendra planets)."
