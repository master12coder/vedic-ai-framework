    - "Venus is strong in a kendra, protecting the marriage"
  effects:
    general: "Early widowhood is indicated in classical texts — loss of spouse either through death or prolonged separation that amounts to functional widowhood. Moon in the house of death combined with an afflicted 7th lord severs the marital bond. In modern interpretation, this can also indicate severe marital crisis, prolonged separation, or the native outliving their partner by many decades."
  source: "Saravali chapter on female horoscopy; Phaladeepika chapter 20"
