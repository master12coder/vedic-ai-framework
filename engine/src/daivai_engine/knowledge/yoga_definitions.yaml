    health: "Robust health and longevity. The beneficial energy surrounding the Moon supports strong emotional and physical wellbeing."
  strength_factors:
    - "Strongest when all three benefics are in dignity (own, exalted, or mooltrikona)"
    - "Enhanced when they occupy the 6th, 7th, and 8th houses of the Lagna as well"
    - "More powerful when the Moon is also strong (waxing, in own or exalted sign)"
    - "Amplified when this Adhi Yoga configuration is in the Navamsha as well"
  source: "Phaladeepika chapter 7 — Adhi Yoga grades; BPHS chapter 30"
  confidence: "high"

adhi_yoga_madhya:
  name_en: "Adhi Yoga — Madhya (Middle) Grade"
  name_hi: "अधि योग — मध्य"
  type: "benefic"
  formation:
    condition: "Any two of the three natural benefics (Jupiter, Venus, Mercury) are placed in the 6th, 7th, and 8th houses from the Moon sign. The middle grade of Adhi Yoga is still highly auspicious — two of the three wisdom planets support the Moon from the opposite hemisphere."
    planets: ["jupiter", "venus", "mercury"]
    houses_required: [6, 7, 8]
    sign_condition: "two_benefics_in_6_7_8_from_moon"
  cancellation:
