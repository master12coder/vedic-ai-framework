    - "Saturn heavily afflicts the 5th house without benefic support"
  effects:
    general: "The native is a gifted creative artist — their medium may be poetry, music, visual arts, dance, cinema, or design. Venus brings aesthetic sensibility and heart-based expression; Mercury provides the technical craft and verbal articulation. Together in trikonas, they create enduring artistic contributions."
    career: "Poet, musician, visual artist, film director, fashion designer, architect, choreographer, and any creative vocation where beauty and intelligence merge."
  source: "Saravali; Phaladeepika chapter 6"
