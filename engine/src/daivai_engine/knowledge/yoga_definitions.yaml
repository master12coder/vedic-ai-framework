    planets: ["sun", "mercury"]
    houses_required: [1, 4, 7, 10]
    sign_condition: "none"
  cancellation:
    - "Mercury is severely combust (within 3 degrees of Sun)"
    - "Both planets are in Saturn's or Mars's sign without benefic aspect"
  effects:
    general: "The Budhaditya Yoga (Sun + Mercury conjunction) in a powerful kendra house dramatically amplifies its effects. The native's intelligence, communication, and authority shine in the most visible houses of the chart. Intellectual leadership, authoritative communication, and career success through information mastery are strongly indicated."
    career: "Political speech-writing, government communication, intellectual leadership in public institutions, and any visible role requiring the combination of authority and articulate expression."
  source: "Phaladeepika chapter 6; classical Budhaditya commentary"
  confidence: "high"

chandra_adhi_yoga_refined:
  name_en: "Adhi Yoga (Benefics in 6th-7th-8th from Moon)"
  name_hi: "आधि योग (चन्द्र से षट्-सप्तम-अष्टम)"
  type: "benefic"
  formation:
