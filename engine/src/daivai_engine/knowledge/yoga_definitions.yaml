    houses_required: []
  cancellation:
    - "The aspecting benefic is severely afflicted or combust"
    - "Moon receives simultaneous malefic aspects that overpower the benefic aspect"
  effects:
    general: "A benefic planet aspecting the Moon from a distance provides protective energy even when no planet flanks the Moon. Jupiter's aspect is especially powerful — it bestows wisdom, faith, and divine protection on the emotionally isolated Moon. Venus's aspect brings beauty and emotional grace."
  source: "BPHS chapter 23 rule 7; Saravali chapter 11"
  confidence: "high"

kemadruma_bhanga_rule8:
  name_en: "Kemadruma Bhanga Rule 8 — Moon with Navamsha Strength (Vargottama)"
  name_hi: "केमद्रुम भंग नियम ८"
  type: "benefic"
  formation:
    condition: "The Moon occupies the same sign in both the Rashi (natal) chart and the Navamsha (D9) chart — the Moon is Vargottama. Vargottama position gives the Moon deep-seated strength across multiple levels of existence, cancelling Kemadruma's superficial weakness."
    planets: ["moon"]
    houses_required: []
    sign_condition: "vargottama"
  cancellation:
    - "Vargottama Moon is additionally in Gandanta (junctional point) which weakens Vargottama strength"
  effects:
    general: "A Vargottama Moon has the same sign in both Rashi and Navamsha — this is a position of fundamental strength in the Vedic tradition. The Moon's qualities are consistent and deep-rooted across the material and soul levels. This inherent strength cancels Kemadruma's isolation effect."
  source: "BPHS chapter 23 rule 8; classical Vargottama analysis"
  confidence: "medium"

# =============================================================================
# RAJA YOGA BHANGA (Cancellation of Royal Yogas)
# Source: BPHS Ch.40; Phaladeepika Ch.6; Saravali
# =============================================================================

raj_yoga_bhanga_1:
  name_en: "Raja Yoga Bhanga 1 — Raj Yoga Planets Afflicted by Rahu/Ketu"
  name_hi: "राज योग भंग १"
  type: "mixed"
  formation:
    condition: "The planets forming a Raj Yoga (kendra lord + trikona lord conjunction) are conjunct or closely aspected by Rahu or Ketu. The shadowy planets' obscuring influence on the Raj Yoga planets diminishes the royal results to shadow and illusion."
    planets: ["rahu", "ketu"]
    houses_required: []
  cancellation:
    - "Jupiter's aspect on the Raj Yoga planets mitigates Rahu/Ketu's obscuring influence"
    - "The Raj Yoga is Yogakaraka (single planet owning both kendra and trikona) — stronger resistance to Bhanga"
  effects:
    general: "The Raj Yoga's positive results are shadowed and made inconsistent by Rahu/Ketu's influence. The native may achieve positions of power but they are unstable, built on illusions, or come with unexpected reversals. Rahu gives rise through unconventional or shadowy means; Ketu creates detachment and sudden drops from the heights achieved."
  source: "BPHS chapter 40 on Raja Yoga Bhanga; Phaladeepika chapter 6"
  confidence: "high"

raj_yoga_bhanga_2:
  name_en: "Raja Yoga Bhanga 2 — Raj Yoga Planet Combust"
  name_hi: "राज योग भंग २"
  type: "mixed"
  formation:
    condition: "One or both of the planets forming the Raj Yoga are combust — within 6 degrees of the Sun (for general combustion; stricter thresholds apply per planet). A combust planet loses its signification to the Sun's overwhelming radiance."
    planets: ["sun"]
    houses_required: []
  cancellation:
    - "The combust planet is Mercury or Venus, which are frequently combust and have greater tolerance"
    - "The Raj Yoga involves the Sun itself as one of the yoga planets — combustion is irrelevant"
  effects:
    general: "Combustion burns away the planet's ability to give Raj Yoga results. The native may have the combination but experiences the effects in weakened, inconsistent, or ego-driven ways. Governmental power and recognition are there but come with political fire and potential burning of achievements."
  source: "BPHS chapter 40; classical combustion analysis"
  confidence: "high"

raj_yoga_bhanga_3:
  name_en: "Raja Yoga Bhanga 3 — Raj Yoga Formed in 6th/8th House"
  name_hi: "राज योग भंग ३"
  type: "mixed"
  formation:
    condition: "The conjunction of kendra and trikona lords that forms the Raj Yoga occurs in the 6th or 8th house. Although the planets are connected, their placement in dusthana houses (houses of enemies, obstacles, and death) severely weakens the royal results."
    planets: []
    houses_required: [6, 8]
  cancellation:
    - "The planets in 6th/8th have exceptional sign dignity (own/exalted) which partially overcomes placement weakness"
    - "8th house placement can give rise after adversity (Vipreet Raj Yoga aspect)"
  effects:
    general: "Raja Yoga formed in the house of enemies (6th) or death/obstacles (8th) is weakened — the native achieves power but through severe struggle, after overcoming enemies, or in domains related to these challenging houses. In the 8th, raja yoga may manifest late in life after surviving serious dangers."
  source: "Phaladeepika chapter 6 on Raja Yoga bhanga; BPHS"
  confidence: "high"

raj_yoga_bhanga_4:
  name_en: "Raja Yoga Bhanga 4 — 6th/8th Lord Between Raj Yoga Planets"
  name_hi: "राज योग भंग ४"
  type: "mixed"
  formation:
    condition: "The 6th lord or 8th lord is placed between (conjunct) the two planets forming the Raj Yoga, injecting the energy of enemies, obstacles, and adversity directly into the royal combination. The dusthana lord poisons the Raj Yoga from within."
    planets: ["6th_lord", "8th_lord"]
    houses_required: []
  cancellation:
    - "The 6th or 8th lord is a natural benefic (Jupiter/Venus) — its dusthana lordship is less damaging"
    - "The raj yoga conjunction is in the 6th lord's own sign, making the 6th lord a yogakaraka there"
  effects:
    general: "The Raj Yoga's power is compromised by the presence of an enemy lord within the combination. Power and obstruction coexist — the native achieves high positions but faces continuous opposition, health challenges, or hidden enemies working against their success. The combination is present but never fully clean."
  source: "BPHS chapter 40; Phaladeepika on dusthana lord interference"
  confidence: "medium"

raj_yoga_bhanga_5:
  name_en: "Raja Yoga Bhanga 5 — Yogakaraka Planet Severely Afflicted"
  name_hi: "राज योग भंग ५"
  type: "mixed"
  formation:
    condition: "A Yogakaraka planet (one that owns both a kendra and a trikona house for a given Lagna) is severely afflicted: it is simultaneously combust, debilitated, in planetary war defeat, and/or hemmed between malefics (papa kartari). All these conditions together destroy its yogakaraka power."
    planets: []
    houses_required: []
  cancellation:
    - "Yogakaraka is only combust but not debilitated — weakened but not fully cancelled"
    - "Jupiter aspects the afflicted yogakaraka — divine grace partially restores its benefic nature"
  effects:
    general: "The most powerful single planet for a Lagna (Yogakaraka) being destroyed through multiple afflictions is a devastating Raja Yoga Bhanga. All the promise of that planet's royal blessings is neutralized. The native may have the chart potential of a Yogakaraka but experiences its worst manifestations — power struggles, falls from positions, wealth lost."
  source: "BPHS chapter 40; classical Yogakaraka analysis by Lagna"
  confidence: "high"

# =============================================================================
# ADDITIONAL BALARISHTA YOGAS (Infant Danger)
# Source: BPHS Ch.19; Brihat Jataka Ch.7; Saravali Ch.11
# =============================================================================

balarishta_5:
  name_en: "Balarishta Yoga 5 — Malefics in All Three Kendra Trikonas"
  name_hi: "बालारिष्ट योग ५"
  type: "malefic"
  formation:
    condition: "Natural malefics (Saturn, Mars, Sun, Rahu, Ketu) occupy the 4th, 8th, and 12th houses simultaneously (the three Apoklima dusthana-adjacent houses from the Lagna) with no benefic counterforce. These three positions around the three trines of suffering create compound childhood danger."
    planets: []
    houses_required: [4, 8, 12]
  cancellation:
    - "Jupiter aspects any of these three houses"
    - "Lagna lord is in own or exalted sign in a kendra"
    - "A natural benefic is in the Lagna"
  effects:
    general: "The native faces serious danger during early childhood (0-12 years) from this triple malefic configuration. BPHS lists compound dusthana occupation as a critical indicator of Balarishta. The native may face life-threatening illness in infancy, difficult birth circumstances, or prolonged childhood health crises."
  source: "BPHS chapter 19; Brihat Jataka chapter 7 on Balarishta"
  confidence: "high"

balarishta_6:
  name_en: "Balarishta Yoga 6 — Waning Moon in 6th/8th with Malefic Aspect"
  name_hi: "बालारिष्ट योग ६"
  type: "malefic"
  formation:
    condition: "The Moon is waning (dark fortnight, Krishna Paksha — Moon is between 180° and 360° ahead of Sun) AND placed in the 6th or 8th house, AND additionally receives an aspect from a malefic (Saturn, Mars, Rahu, or Sun) without any benefic relief."
    planets: ["moon"]
    houses_required: [6, 8]
  cancellation:
    - "Jupiter aspects the Moon directly"
    - "Venus is conjunct the Moon in the dusthana — beauty and grace protect the Moon's expression"
    - "Moon is in its own sign (Cancer) in 4th from Lagna (4th house = Cancer for some Lagnas)"
  effects:
    general: "A dark Moon (Krishna Paksha) already has reduced luminosity and weakened Paksha Bala; placing this weakened Moon in the 6th or 8th house with malefic aspect creates dangerous childhood conditions. The native's mother may be ill or unavailable during childhood, and the native faces significant health challenges in early years."
  source: "BPHS chapter 19; Brihat Jataka Balarishta chapter"
  confidence: "high"

balarishta_7:
  name_en: "Balarishta Yoga 7 — Lagna Lord in 8th, 8th Lord in Lagna with Malefic"
  name_hi: "बालारिष्ट योग ७"
  type: "malefic"
  formation:
    condition: "The Lagna lord is placed in the 8th house AND the 8th lord is placed in the Lagna (mutual exchange between 1st and 8th), and additionally a malefic is conjunct either of these planets in this exchange. This parivartana between life (1st) and death (8th) is dangerous when activated by malefics."
    planets: ["lagna_lord", "8th_lord"]
    houses_required: [1, 8]
  cancellation:
    - "Jupiter is also in the Lagna or 8th house, converting the exchange into a mixed spiritual yoga"
    - "Both Lagna lord and 8th lord are naturally benefic planets (e.g., Venus and Jupiter)"
    - "The exchange involves no additional malefic conjunctions"
  effects:
    general: "The mutual exchange (parivartana) between the 1st and 8th houses is inherently dangerous for longevity when activated by malefics. The native's self and vitality (1st house) are in the domain of death/transformation (8th house) and vice versa. This creates childhood danger from life-threatening situations, possibly connected to inheritance or hidden family circumstances."
  source: "BPHS chapter 19; classical Parivartana analysis for Balarishta"
  confidence: "medium"

balarishta_8:
  name_en: "Balarishta Yoga 8 — Gandanta Moon with No Benefic"
  name_hi: "बालारिष्ट योग ८ (गांडांत चंद्र)"
  type: "malefic"
  formation:
    condition: "The Moon is placed in a Gandanta zone — the junctional degrees between a water sign (Cancer, Scorpio, Pisces) and a fire sign (Leo, Sagittarius, Aries) — specifically within the last 3.5 degrees of a water nakshatra or first 3.5 degrees of a fire nakshatra, AND no benefic planet provides protective aspect."
    planets: ["moon"]
    houses_required: []
    sign_condition: "gandanta_zone"
  cancellation:
    - "Jupiter directly aspects the Gandanta Moon"
    - "Moon is in Gandanta but in the 1st or 4th house with lagna lord strong"
    - "Full Moon (Poornima) in Gandanta — luminosity counteracts the junctional weakness"
  effects:
    general: "Gandanta is considered one of the most dangerous positions in Jyotish — a Moon caught between a dissolving water nakshatra and an igniting fire nakshatra is in cosmic flux. For the native, this creates intense instability in childhood, often associated with danger to the mother, difficult birth, or early life crises. Classical texts require extensive Shanti (peace rituals) for Gandanta Moon births."
  source: "BPHS chapter 19; Muhurta Chintamani on Gandanta; classical Balarishta analysis"
  confidence: "high"

# =============================================================================
# ADDITIONAL DARIDRA YOGAS (Poverty) FROM PHALADEEPIKA
# Source: Phaladeepika Ch.12; Saravali Ch.22; BPHS Ch.41
# =============================================================================

daridra_yoga_11:
  name_en: "Daridra Yoga 11 — 6th Lord in 11th, 11th Lord in 6th"
  name_hi: "दरिद्र योग ११"
  type: "malefic"
  formation:
    condition: "The 6th lord (debts, enemies, disease) is placed in the 11th house (gains, income) AND the 11th lord (gains) is placed in the 6th house (debts). This mutual exchange between gains and debts creates a life where income is consumed by debts, legal battles, medical expenses, or enemy actions."
    planets: ["6th_lord", "11th_lord"]
    houses_required: [6, 11]
  cancellation:
    - "Both lords are natural benefics or yogakarakas creating a benefic parivartana"
    - "Jupiter aspects both the 6th and 11th houses"
  effects:
    general: "Income and gains (11th house) are perpetually consumed by debts and adversaries (6th house). The native earns but the money flows out through loans, medical bills, litigation, or losses to enemies. Classical texts indicate chronic financial instability despite effort — the native works hard but cannot retain wealth."
  source: "Phaladeepika chapter 12 on Daridra yogas"
  confidence: "high"

daridra_yoga_12:
  name_en: "Daridra Yoga 12 — Lagna Lord in 12th, 12th Lord in Lagna"
  name_hi: "दरिद्र योग १२"
  type: "malefic"
  formation:
    condition: "The Lagna lord (self, vitality) is placed in the 12th house (losses, foreign lands, confinement) AND the 12th lord is placed in the Lagna. This mutual exchange between the self and losses means the native's identity is colored by loss, while loss themes pervade their very being."
    planets: ["lagna_lord", "12th_lord"]
    houses_required: [1, 12]
  cancellation:
    - "Both planets are natural benefics, making the exchange spiritually transformative rather than materially destructive"
    - "Jupiter is in the Lagna or 12th house, elevating the exchange to spiritual liberation (moksha)"
    - "The exchange occurs in own or exalted signs for both planets"
  effects:
    general: "Financial losses are tied to the native's fundamental identity. The native spends freely, may live abroad, or has a life marked by expenditure exceeding income. Phaladeepika associates this combination with poverty through dissipation of resources. However, if both lords are benefics, this can indicate a spiritual life where the native voluntarily renounces material wealth."
  source: "Phaladeepika chapter 12; BPHS chapter 41"
  confidence: "high"

daridra_yoga_13:
  name_en: "Daridra Yoga 13 — 2nd Lord in 8th, 8th Lord in 2nd"
  name_hi: "दरिद्र योग १३"
  type: "malefic"
  formation:
    condition: "The 2nd lord (wealth, family) is placed in the 8th house (hidden matters, sudden events, legacies) AND the 8th lord is placed in the 2nd house. This exchange between accumulated wealth and sudden transformation creates financial instability and sudden financial crises."
    planets: ["2nd_lord", "8th_lord"]
    houses_required: [2, 8]
  cancellation:
    - "Both planets in exchange are natural benefics"
    - "Jupiter aspects both the 2nd and 8th houses"
    - "The 8th lord is well-dignified in the 2nd — sudden wealth from inheritance (benefic 8th results)"
  effects:
    general: "Wealth (2nd house) is repeatedly disrupted by sudden events, transformations, or hidden circumstances (8th house). The native may receive sudden money and lose it just as suddenly, or face unexpected financial crises. This yoga can also indicate inheritance (8th) that causes family conflict (2nd)."
  source: "Phaladeepika chapter 12; Saravali chapter 22"
  confidence: "high"

daridra_yoga_14:
  name_en: "Daridra Yoga 14 — Jupiter Debilitated in 2nd with Malefic"
  name_hi: "दरिद्र योग १४"
  type: "malefic"
  formation:
    condition: "Jupiter (natural significator of wealth) is debilitated (in Capricorn) AND placed in the 2nd house of wealth, with an additional malefic (Saturn, Mars, or Rahu) conjunct or aspecting this debilitated Jupiter."
    planets: ["jupiter", "saturn"]
    houses_required: [2]
    sign_condition: "jupiter_debilitated"
  cancellation:
    - "Neech Bhanga condition applies to Jupiter — debilitation is cancelled"
    - "Venus is conjunct Jupiter in the 2nd — beauty and refinement of Jupiter's weakness"
    - "Mars is in Cancer (exalted) aspecting Jupiter from the 4th"
  effects:
    general: "Jupiter's debilitation in the house of wealth, compounded by malefic conjunction, severely damages the native's financial prospects. Jupiter is the karaka of wealth, wisdom, and expansion — its debilitation in Capricorn means these qualities are contracted and restricted. Malefic addition further damages financial stability, indicating chronic poverty or wasteful financial behavior."
  source: "Phaladeepika chapter 12 on financial yogas"
  confidence: "medium"

daridra_yoga_15:
  name_en: "Daridra Yoga 15 — 5th and 9th Lords in Dusthana with Malefics"
  name_hi: "दरिद्र योग १५"
  type: "malefic"
  formation:
    condition: "Both the 5th lord (intelligence, speculative gains, past-life merit) and the 9th lord (fortune, dharma, father's blessings) are placed in dusthana houses (6th, 8th, or 12th) AND both are additionally afflicted by malefic conjunction or aspect. This destroys both merit-based fortune and dharmic blessings."
    planets: ["5th_lord", "9th_lord"]
    houses_required: [6, 8, 12]
  cancellation:
    - "Jupiter aspects both dusthana houses containing these lords"
    - "One of these lords is in own or exalted sign in the dusthana — powerful despite placement"
  effects:
    general: "The two great fortune houses (5th and 9th) are compromised simultaneously. Phaladeepika describes this as destroying both purva punya (past merit) and bhagya (destiny luck), leaving the native without divine support for prosperity. The native's intelligence may be misapplied, and fortune is consistently blocked despite effort."
  source: "Phaladeepika chapter 12; BPHS chapter 41 on Arishta"
  confidence: "medium"

