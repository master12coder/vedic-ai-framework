    career: "Minister-like status, leadership through wisdom and diplomacy, advisory and counseling roles."
    health: "Strong emotional resilience. The benefics protecting Moon from three sides create excellent mental health and emotional stability."
  source: "Phaladeepika chapter 7 on Adhi Yoga; Saravali"
  confidence: "high"

# =============================================================================
# HORA SARA YOGAS (From Hora Sara by Prithuyasas, son of Varahamihira)
# =============================================================================

hora_sara_dhan_yoga:
  name_en: "Hora Sara Dhana Yoga (2nd, 5th, 11th Lords Together)"
  name_hi: "होरासार धन योग"
  type: "benefic"
  formation:
    condition: "The 2nd lord (wealth accumulation), 5th lord (intelligence, speculation), and 11th lord (gains, income) are all placed in kendras or trikonas, preferably conjunct or in mutual aspect — three wealth-relevant lords in agreement."
    planets: ["2nd_lord", "5th_lord", "11th_lord"]
    houses_required: [1, 4, 5, 7, 9, 10]
  cancellation:
    - "All three are debilitated or severely afflicted by malefics"
    - "One of the three lords is the 6th or 8th lord simultaneously (complex ownership)"
  effects:
    general: "Exceptional wealth through the triple agreement of accumulation (2nd), intelligence/speculation (5th), and income gains (11th). The native earns through multiple channels — steady income, speculative investments, and long-term gains — all reinforcing each other. This is one of the strongest Dhana combinations in Hora Sara."
    finance: "Multiple simultaneous income streams. Wealth from salary/business AND investments AND speculative ventures. Consistent financial growth over decades."
  source: "Hora Sara chapter 9 on Dhana Yogas"
  confidence: "high"

hora_sara_karma_yoga:
  name_en: "Hora Sara Karma Yoga (Saturn Strong in 10th)"
  name_hi: "होरासार कर्म योग"
  type: "benefic"
  formation:
