  name_hi: "राज संबंध योग"
  type: "benefic"
  formation:
    condition: "Exchange (parivartana) between the lord of a kendra house and the lord of a trikona house, where each occupies the other's house."
    planets: ["kendra_lord", "trikona_lord"]
    houses_required: [1, 4, 5, 7, 9, 10]
    sign_condition: "parivartana"
  cancellation:
    - "Either planet is debilitated in the exchanged sign"
    - "Both planets are combust or aspected by malefics"
  effects:
    general: "Powerful raj yoga through mutual exchange. The native rises to positions of authority with support from powerful institutions. The exchange creates a strong and lasting bond between fortune and action."
  source: "BPHS chapter 41"
  confidence: "high"

parashara_raj_1:
  name_en: "Parashara Raj Yoga 1"
  name_hi: "पराशर राज योग १"
  type: "benefic"
  formation:
    condition: "The lords of the 4th and 10th houses are conjunct or in mutual aspect, and both are strong in dignity."
    planets: ["4th_lord", "10th_lord"]
    houses_required: [4, 10]
  cancellation:
    - "Both lords are debilitated or in enemy signs"
    - "The conjunction occurs in a dusthana without benefic aspect"
  effects:
    general: "The native achieves great public recognition, political power, and professional success. Connection of the two primary kendra houses creates a foundation of material stability and public authority."
  source: "BPHS chapter 36"
  confidence: "high"

parashara_raj_2:
  name_en: "Parashara Raj Yoga 2"
  name_hi: "पराशर राज योग २"
  type: "benefic"
  formation:
    condition: "The lords of the 1st and 5th houses are conjunct or in mutual aspect, with at least one in good dignity."
    planets: ["1st_lord", "5th_lord"]
    houses_required: [1, 5]
  cancellation:
    - "Both lords are debilitated"
