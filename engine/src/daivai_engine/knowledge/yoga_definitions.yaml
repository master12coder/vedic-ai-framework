jara_yoga:
  name_en: "Jara Yoga (Extra-Marital Relationship)"
  name_hi: "जार योग"
  type: "malefic"
  formation:
    condition: "Venus and Rahu are conjunct in the 7th house, OR Venus is in the 7th house AND Rahu aspects the 7th lord. The illusory, boundary-crossing energy of Rahu applied to Venus in the partnership house can indicate unconventional relationship patterns."
    planets: ["venus", "rahu"]
    houses_required: [7]
  cancellation:
    - "Jupiter aspects the 7th house, imposing dharmic restraint"
    - "Venus is in own sign, strong enough to maintain dignity"
    - "Saturn aspects Venus — discipline over desire"
  effects:
    general: "Rahu's influence on Venus in the partnership sector creates attraction to forbidden or illicit relationships. The native may engage in relationships outside of formal marriage or pursue partners of unconventional backgrounds. This can create significant social difficulties, family disruption, and in classical contexts, was considered a source of reputation damage."
  source: "Phaladeepika chapter 20; Saravali"
  confidence: "medium"

vivah_virodhaka_yoga:
  name_en: "Vivah Virodhaka Yoga (Obstacles to Marriage)"
