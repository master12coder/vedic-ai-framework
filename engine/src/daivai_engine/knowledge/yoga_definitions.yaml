  effects:
    general: "The native is blessed with children and finds deep joy through progeny. Jupiter in or strongly influencing the 5th house (children) creates the Putrakama Yoga — desire for children (kama) is fulfilled. The native's children may themselves be blessed with intelligence, virtue, and success."
    family: "Happy family life centered around children. The native's children are a source of pride and joy. They may have multiple children and have a harmonious parent-child relationship."
    spiritual: "Jupiter in the 5th gives spiritual wisdom, and the native's children carry forward dharmic traditions. The 5th house is also the house of purva punya (past-life merit), and this yoga indicates the native has earned the blessing of good children."
  strength_factors:
    - "Strongest when Jupiter is exalted in Cancer in the 5th (for Pisces lagna)"
    - "Enhanced when the 5th lord is also exalted or in own sign"
    - "More powerful when the Moon also aspects or conjoins Jupiter"
    - "Amplified during Jupiter mahadasha — children are born or flourish"
  source: "Classical texts on progeny yogas; BPHS chapter 72 on Putra Bhava"
  confidence: "high"

nishturabhashi_yoga:
