# SPECIAL CONJUNCTION YOGAS — Shrapit, Angarak, Brahma Yoga
# Sources: BPHS, Saravali, classical compilations
# =============================================================================

shrapit_yoga:
  name_en: "Shrapit Yoga (Cursed Combination)"
  name_hi: "शापित योग"
  type: "malefic"
  formation:
    condition: "Saturn and Rahu are conjunct in the same house — the combination of Saturn (karma, past-life debts) and Rahu (obsessive desires, illusion) creates a charged karmic burden."
    planets: ["saturn", "rahu"]
    houses_required: []
    sign_condition: "none"
  cancellation:
    - "Jupiter aspects the conjunction with full strength"
    - "The conjunction is in Aquarius (Saturn's own sign), giving Rahu a grounded expression"
    - "The conjunction is in Virgo or Gemini (friendly for both)"
  effects:
    general: "The native carries heavy karmic debt from past lives, indicated by the combined weight of Saturn (karma arbiter) and Rahu (accumulated desires). Life may be marked by repeated frustrations, obstacles that seem disproportionate to current-life actions, and mysterious difficulties. The native may be falsely accused, unjustly punished, or experience inexplicable setbacks. Remedies include Saturn and Rahu-specific rituals (Shani Puja, Rahu Japa, Nagapratishtha)."
    spiritual: "Despite its challenges, this yoga can create profound spiritual depth — the native may turn to spirituality through suffering, ultimately transcending the karma it represents."
  source: "Classical texts; widely cited in BPHS commentary"
  confidence: "high"

angarak_yoga:
  name_en: "Angarak Yoga (Mars-Rahu Fire Combination)"
  name_hi: "अंगारक योग"
  type: "malefic"
  formation:
    condition: "Mars and Rahu are conjunct in the same house — Mars's fiery aggression combined with Rahu's intensity and unconventionality creates an explosive, unpredictable energy."
    planets: ["mars", "rahu"]
    houses_required: []
    sign_condition: "none"
  cancellation:
    - "Jupiter aspects the conjunction, moderating the fire"
    - "Conjunction is in Capricorn (Mars exalted, Rahu gains discipline)"
    - "Conjunction is in the 3rd house (courage) — can give extraordinary bravery and initiative"
  effects:
    general: "Intense, volatile energy that can manifest as explosive anger, reckless action, accidents, fire-related injuries, or extreme aggression. The native may be hot-headed, impulsive, and prone to conflict. In positive cases, this combination gives extraordinary courage, physical power, and the willingness to take extreme risks — suited for action heroes, extreme athletes, soldiers, or innovators who break conventions."
    health: "Risk of accidents, injuries, fire hazards, and surgical emergencies. The native should be cautious with sharp objects, fire, and extreme sports."
  source: "Classical texts; widely cited in Saravali commentary"
