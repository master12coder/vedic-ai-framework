    planets: ["saturn"]
    houses_required: [10]
    sign_condition: "own_or_exalted"
    valid_signs: ["capricorn", "aquarius", "libra"]
  cancellation:
    - "Saturn is conjunct debilitated planets in the 10th"
    - "Sun afflicts Saturn in the 10th (natural enmity)"
  effects:
    general: "Exceptional career longevity, authority, and discipline characterize the native. Saturn in the highest point of the chart (10th) in its own or exalted position creates an individual who achieves their career peak through sustained effort, discipline, and patience. They become recognized authorities in their field — not through luck or inheritance, but through decades of committed work."
    career: "Industrial leader, government administrator, construction baron, judicial authority, infrastructure expert, and any long-term authority-demanding career."
  source: "Hora Sara chapter on 10th house and Saturn"
  confidence: "high"

hora_sara_rin_yoga:
  name_en: "Rin Yoga (Debt and Financial Liability)"
  name_hi: "ऋण योग"
  type: "malefic"
  formation:
    condition: "The 6th lord (debt, enemies, service) is placed in the 2nd house (wealth) OR the 2nd lord is placed in the 6th house AND a malefic aspects the 11th house (gains), disrupting the income-to-savings pipeline."
    planets: ["6th_lord", "2nd_lord"]
    houses_required: [2, 6]
  cancellation:
    - "Jupiter aspects either the 2nd or 6th house"
    - "The 6th lord is a natural benefic (Jupiter or Venus) — debt leads to opportunity"
  effects:
    general: "Chronic financial liabilities, debt cycles, and difficulty retaining wealth. The native earns but is perpetually obligated to service debts, loans, and financial commitments. The crossing of 6th house (debt signifier) with 2nd house (wealth) creates a structural drain on the treasury."
  source: "Hora Sara chapter 9; BPHS on 6th house"
  confidence: "high"

hora_raja_yoga_9_10:
  name_en: "Hora Sara Raja Yoga (9th-10th Mutual Aspect)"
  name_hi: "होरासार राज योग (नवम-दशम परस्पर दृष्टि)"
  type: "benefic"
  formation:
    condition: "The 9th lord and 10th lord are in mutual aspect (each aspects the other's house) — creating the Hora Sara version of the Dharma-Karma connection yoga."
    planets: ["9th_lord", "10th_lord"]
    houses_required: [9, 10]
  cancellation:
    - "Aspect is broken by an intermediate malefic"
    - "Both lords are debilitated or combust"
  effects:
    general: "Fortune and profession are mutually supportive — the native's career brings fortune, and their fortune supports their career. Work is meaningful and aligned with dharmic purpose. This is Hora Sara's formulation of what BPHS calls the Dharma-Karmadhipati Yoga, specifically through aspect rather than conjunction."
  source: "Hora Sara chapter on Raja Yoga combinations"
  confidence: "high"

