    planets: ["rahu", "saturn"]
    houses_required: [12]
  cancellation:
    - "Jupiter aspects the lagna, 12th house, or the afflicted Sun"
    - "Sun is in its own sign (Leo) or exaltation (Aries)"
  effects:
    general: "Legal trouble, imprisonment, or severe restrictions on personal freedom are indicated. Rahu in confinement houses combined with Saturn's restrictive force and a weakened Sun (representing the native's autonomy and standing before authority) creates circumstances where the native faces incarceration, house arrest, or prolonged legal battles."
  source: "Saravali chapter on 12th house; classical texts"
  confidence: "medium"

kutumbha_poshana_yoga:
  name_en: "Kutumbha Poshana Yoga (Family Provider)"
  name_hi: "कुटुम्ब पोषण योग"
  type: "benefic"
  formation:
    condition: "Jupiter is placed in the 2nd house (family, sustenance) in good dignity AND the 4th lord is strong. The Moon (nurturing, family care) is also well-placed, creating a strong family-sustaining energy."
    planets: ["jupiter", "moon"]
    houses_required: [2, 4]
    sign_condition: "good_dignity"
  cancellation:
    - "Jupiter in 2nd is debilitated (Capricorn)"
    - "Moon is severely afflicted, disrupting family harmony"
  effects:
    general: "The native is the natural pillar and provider of their family. Jupiter's expansive benevolence in the house of family creates someone who nourishes, supports, and protects their extended family with generosity. The family prospers under the native's stewardship. Ancestral tradition is honored and carried forward."
    finance: "Wealth serves family sustenance. The native earns primarily to provide for family members, and this dharmic motivation itself attracts more wealth."
  source: "Saravali; classical 2nd house analysis"
  confidence: "high"

