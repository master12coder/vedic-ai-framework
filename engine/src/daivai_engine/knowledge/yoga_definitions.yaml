    planets: ["saturn", "venus", "ketu"]
    houses_required: [7]
  cancellation:
    - "Jupiter aspects the 7th house with full strength"
    - "Venus is exalted or in own sign despite other afflictions"
    - "Only one or two of the conditions are present (partial obstruction, not full denial)"
  effects:
    general: "Multiple simultaneous obstacles create persistent blocks to marriage throughout the native's life. Each individual condition is a delay or difficulty; their cumulative combination is a fundamental life challenge around partnership. Marriage may occur very late (after 35-40), may be repeatedly broken before solemnization, or may remain entirely elusive."
  source: "Phaladeepika chapter 7; Saravali on 7th house afflictions"
  confidence: "medium"

deerga_kumara_yoga:
  name_en: "Deerga Kumara Yoga (Long Bachelorhood)"
  name_hi: "दीर्घ कुमार योग"
  type: "malefic"
  formation:
    condition: "Saturn is placed in the 7th house (the house of marriage) AND Ketu is placed in the 1st or 2nd house, with no benefic aspecting the 7th house or the 7th lord."
    planets: ["saturn", "ketu"]
    houses_required: [1, 7]
  cancellation:
    - "Jupiter or Venus aspects the 7th house"
    - "Venus is strong in a kendra or trikona"
  effects:
    general: "The native remains unmarried or unpartnered for a long period — Saturn's delaying force in the very house of marriage combined with Ketu's spiritualizing influence on the self (1st/2nd house) suggests the native either does not find marriage a priority or faces persistent obstacles to partnership. Classical texts also associate this with deep introspection about the nature of commitment."
  source: "Classical texts on Saturn in 7th; Saravali"
  confidence: "medium"

dwi_vivah_yoga:
  name_en: "Dwi Vivah Yoga (Multiple Marriages)"
  name_hi: "द्वि विवाह योग"
  type: "mixed"
  formation:
    condition: "The 7th house has both benefic and malefic planets simultaneously, OR the 7th lord is in the 11th house (gains/fulfillment of desires beyond one spouse) AND the 2nd lord (family continuation) is also connected to the 7th or 11th house. Multiple planets in the 7th can also indicate multiple partnerships."
    planets: ["7th_lord", "2nd_lord"]
    houses_required: [7, 11]
  cancellation:
    - "Jupiter in the 7th house alone, imposing monogamous values"
    - "Saturn in 7th — delays and limits rather than multiplies"
  effects:
    general: "Two or more significant marriages or life partnerships are indicated. The first marriage may end through separation, divorce, or death of spouse, leading to a second marriage. In some cases, the native may have simultaneous partnerships (historically associated with polygamy in classical texts). Modern interpretation focuses on remarriage after the end of the first union."
  source: "Phaladeepika chapter 20; BPHS chapter 18"
  confidence: "medium"

satputra_vivah_yoga:
  name_en: "Satputra Vivah Yoga (Marriage Bringing Children)"
  name_hi: "सत्पुत्र विवाह योग"
  type: "benefic"
  formation:
    condition: "Jupiter is placed in the 7th house AND the 5th lord (children) is connected to the 7th house lord through conjunction, aspect, or exchange. Marriage directly opens the path to progeny."
    planets: ["jupiter", "5th_lord"]
    houses_required: [7]
  cancellation:
