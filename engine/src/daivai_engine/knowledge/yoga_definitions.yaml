    general: "When both the great benefics Jupiter and Venus occupy favorable positions, the native's life is marked by abundance, grace, and prosperity. Jupiter brings wisdom-based wealth and spiritual blessings; Venus brings material comforts and sensual pleasures. Their combined presence in strong houses creates a life of both spiritual and material fulfillment."
    finance: "Lasting material prosperity through both wisdom (Jupiter) and material resources (Venus)."
  source: "Phaladeepika chapter 11; BPHS chapter 37"
  confidence: "high"

# =============================================================================
# ADDITIONAL SANYASA/PRAVRAJYA YOGAS FROM SARAVALI
# Source: Saravali Ch.27; Phaladeepika Ch.15; Jataka Parijata
# =============================================================================

sanyasa_yoga_4:
  name_en: "Sanyasa Yoga 4 — Saravali Four Planets in One Sign"
  name_hi: "संन्यास योग ४ (सरावली)"
  type: "mixed"
  formation:
    condition: "Four or more planets (excluding Rahu and Ketu) are conjunct in one sign. Saravali states that when four planets gather in a single sign, the native is driven to renunciation, regardless of which specific planets or sign is involved. The concentration of planetary energy in one area creates a tendency to withdraw from the rest of life."
    planets: []
    houses_required: []
  cancellation:
    - "All four planets are strongly dignified and in a kendra — worldly success may outweigh renunciation tendency"
    - "Venus is among the four planets and is the strongest — material pleasure may keep the native worldly"
  effects:
    general: "Saravali's rule that four planets in one sign indicates Pravrajya (wandering ascetic life) reflects the principle of planetary concentration creating an imbalanced but intense focus. The native's attention is drawn overwhelmingly to the matters of the occupied house and sign, creating a monkish single-mindedness. In the spiritual houses (4th, 8th, 12th), renunciation is actual; in worldly houses, it may manifest as a single-minded professional or creative focus."
  source: "Saravali chapter 27 on Pravrajya; classical text"
  confidence: "high"

sanyasa_yoga_5:
  name_en: "Sanyasa Yoga 5 — 12th Lord in Lagna with Saturn Aspect"
  name_hi: "संन्यास योग ५"
  type: "mixed"
  formation:
    condition: "The 12th lord (isolation, moksha, foreign lands, liberation) is placed in the Lagna (1st house — self, identity, physical body), AND Saturn aspects the Lagna. The identity is permeated by the energy of liberation and loss while Saturn creates detachment and austerity."
    planets: ["12th_lord", "saturn"]
    houses_required: [1]
  cancellation:
    - "Venus also aspects or is in the Lagna — material pleasures retain the native in worldly life"
    - "The 12th lord is a natural benefic in excellent dignity — spiritual path taken joyfully without suffering"
  effects:
    general: "The native's identity is shaped by the themes of the 12th house — loss, liberation, retreat, and isolation — while Saturn's aspect creates austerity and detachment from worldly pleasures. This combination drives the native toward asceticism, foreign residence, or spiritual practice as a fundamental lifestyle choice rather than circumstantial event."
  source: "Saravali chapter 27; Phaladeepika chapter 15"
  confidence: "medium"

sanyasa_yoga_6:
  name_en: "Sanyasa Yoga 6 — Ketu in 1st, Lagna Lord in 12th"
  name_hi: "संन्यास योग ६"
  type: "mixed"
  formation:
    condition: "Ketu is placed in the Lagna (1st house) AND the Lagna lord is placed in the 12th house. Ketu brings the quality of detachment, past-life spiritual practice, and dissolution of ego to the self; the Lagna lord in the 12th house of moksha completes the renunciation picture."
    planets: ["ketu", "lagna_lord"]
    houses_required: [1, 12]
  cancellation:
    - "Venus is in the 1st or 7th house, drawing the native back into worldly pleasures"
    - "The Lagna lord is exalted in the 12th — spiritual path taken from strength, not weakness"
  effects:
    general: "Ketu in the Lagna dissolves ego boundaries and brings karmic memories of spiritual practice from previous lives. With the Lagna lord itself retreating to the 12th house of liberation, the native's fundamental life orientation is toward withdrawal, meditation, and release from worldly entanglement. Many saints and monks have this configuration."
  source: "Saravali chapter 27; Jataka Parijata on renunciation"
  confidence: "medium"

sanyasa_yoga_7:
  name_en: "Sanyasa Yoga 7 — Moon in 12th with Jupiter Aspect (Spiritual Liberation)"
  name_hi: "संन्यास योग ७ (चंद्र द्वादश गुरु दृष्टि)"
  type: "mixed"
  formation:
    condition: "The Moon is placed in the 12th house (liberation, foreign residence, isolation) AND Jupiter aspects the Moon. The mind (Moon) retreats to the house of moksha while wisdom (Jupiter) illuminates this retreat — creating a spiritually motivated renunciation rather than a forced one."
    planets: ["moon", "jupiter"]
    houses_required: [12]
  cancellation:
    - "Venus also aspects or is conjunct Moon in the 12th — spiritual aspiration balanced by material enjoyment"
    - "Moon in 12th is in own sign (Cancer) — strong enough to maintain worldly connections"
  effects:
    general: "The mind naturally gravitates toward inner worlds, meditation, spiritual practice, and withdrawal. Jupiter's presence transforms the 12th house experience from mere loss to conscious liberation. The native may be a meditator, retreat leader, humanitarian worker in isolated institutions, or live in foreign lands engaged in spiritual service."
  source: "Saravali chapter 27; Jataka Parijata chapter 9"
  confidence: "medium"

# =============================================================================
# ADDITIONAL CONJUNCTION YOGAS (Special Planetary Combinations)
# Source: BPHS; Phaladeepika; Saravali
# =============================================================================

mars_saturn_conjunction:
  name_en: "Mars-Saturn Conjunction Yoga"
  name_hi: "मंगल-शनि युति योग"
  type: "malefic"
  formation:
    condition: "Mars and Saturn are conjunct in the same sign. These two natural malefics are mutual enemies — Mars is fire and aggression while Saturn is cold restraint and karma. Their combination creates friction, frustration, accidents, and karmic challenges."
    planets: ["mars", "saturn"]
    houses_required: []
  cancellation:
    - "The conjunction is in the 3rd or 11th house (upachaya) — malefics in upachaya generate competitive drive"
    - "Jupiter aspects the conjunction — wisdom and grace tempers the friction"
    - "The conjunction is in Capricorn where both are dignified (Saturn own, Mars exalted)"
  effects:
    general: "Mars-Saturn conjunction is classically considered one of the most challenging planetary combinations. Mars wants to act impulsively; Saturn restrains and delays. The internal conflict creates frustration, anger, accidents (especially with fire, sharp objects, or machinery), and forced karmic repayment. However, in upachaya houses, this can create extraordinary drive and competitive achievement."
    health: "Risk of accidents, injuries, inflammation diseases, bone-joint issues."
  source: "BPHS on planetary conjunctions; Phaladeepika chapter 9"
  confidence: "high"

mercury_saturn_conjunction:
  name_en: "Mercury-Saturn Conjunction Yoga"
  name_hi: "बुध-शनि युति योग"
  type: "mixed"
  formation:
    condition: "Mercury and Saturn are conjunct in the same sign. Mercury is the planet of communication, intelligence, and quick adaptability; Saturn slows, deepens, and makes serious. Their combination creates a serious, systematic, and disciplined mind but with possible tendency toward melancholy, speech delays, or overly critical thinking."
    planets: ["mercury", "saturn"]
    houses_required: []
  cancellation:
    - "Jupiter aspects the conjunction — optimism and wisdom balances Saturn's heaviness on Mercury"
    - "The conjunction is in Mercury's own sign (Gemini/Virgo) — Mercury's natural strength reduces Saturn's heaviness"
  effects:
    general: "The native has a serious, disciplined, and systematic mind. They think before speaking and choose words carefully. Saturn's influence on Mercury gives mathematical ability, technical precision, and patience for long-term projects. However, it can also create depression, negative thinking patterns, speech problems in childhood, or a tendency to be overly critical and pessimistic."
    career: "Mathematics, engineering, technical writing, research, auditing, law."
  source: "Phaladeepika chapter 9 on planetary conjunctions; Saravali"
  confidence: "high"

venus_saturn_conjunction:
  name_en: "Venus-Saturn Conjunction Yoga"
  name_hi: "शुक्र-शनि युति योग"
  type: "mixed"
  formation:
    condition: "Venus and Saturn are conjunct. Venus represents love, beauty, and desire; Saturn represents karma, discipline, and detachment. Their conjunction creates a complex relationship with love and pleasure — either delayed but enduring (Saturn's aspect) or karmic and burdensome."
    planets: ["venus", "saturn"]
    houses_required: []
  cancellation:
    - "Jupiter aspects the conjunction — relationships are idealized and protected by wisdom"
    - "The conjunction is in Libra (Saturn exalted, Venus own) — the most harmonious combination of the two"
  effects:
    general: "Love relationships are karmic, serious, and often delayed or burdened. The native may experience significant challenges in romantic life, choosing partners much older or younger, or taking on responsibility for partners. Saturn can also give long-lasting and committed relationships after initial delays. In Libra, this creates extraordinary beauty combined with discipline."
    relationships: "Karmic relationships; love comes with responsibility; delayed marriage or partners with age difference."
  source: "Phaladeepika chapter 9; classical Venus-Saturn analysis"
  confidence: "high"

jupiter_saturn_conjunction:
  name_en: "Jupiter-Saturn Conjunction Yoga (Brahma-Shiva Yoga)"
  name_hi: "गुरु-शनि युति योग (ब्रह्मा-शिव योग)"
  type: "mixed"
  formation:
    condition: "Jupiter and Saturn are conjunct in the same sign. Jupiter expands, Saturn contracts; Jupiter gives wisdom and dharma, Saturn gives karma and discipline. Their conjunction happens approximately every 20 years and creates a profound blend of expansion and restriction in the native's life."
    planets: ["jupiter", "saturn"]
    houses_required: []
  cancellation:
    - "The conjunction is in a sign where both are dignified (Jupiter in Cancer exalted, Saturn in Libra exalted)"
  effects:
    general: "This major conjunction creates a native who understands both expansion and contraction — they are simultaneously optimistic (Jupiter) and realistic (Saturn). They may be teachers of practical wisdom, combining philosophical breadth with systematic rigor. However, the internal conflict between Jupiter's expansiveness and Saturn's restraint can create alternating periods of growth and stagnation. Religious and philosophical authority is common."
    career: "Philosophy, religion, law, administration, teaching."
  source: "Phaladeepika chapter 9; classical planetary cycles"
  confidence: "medium"

mars_mercury_conjunction:
  name_en: "Mars-Mercury Conjunction Yoga"
  name_hi: "मंगल-बुध युति योग"
  type: "mixed"
  formation:
    condition: "Mars and Mercury are conjunct in the same sign. Mars is the soldier, direct and physical; Mercury is the diplomat, communicative and intellectual. Their combination creates a sharp, argumentative, technically skilled, and mathematically inclined mind with a tendency toward aggressive communication."
    planets: ["mars", "mercury"]
    houses_required: []
  cancellation:
    - "Jupiter aspects the conjunction — wisdom tempers Mars's aggression on Mercury's communication"
    - "The conjunction is in Mercury's own sign (Gemini/Virgo) — Mercury's sign strength reduces Mars's harshness"
  effects:
    general: "The native has a sharp, incisive mind and quick argumentative abilities. They excel in fields requiring mental speed, technical precision, and decisive communication. Mars energizes Mercury's intellectual capabilities. However, this combination can also create tendency toward sharp speech, arguments, and conflict through words. In favorable houses, excellent for technical writing, engineering, surgery."
    career: "Engineering, surgery, technical fields, debate, military intelligence."
  source: "Phaladeepika chapter 9; Saravali on planetary conjunctions"
  confidence: "high"

moon_saturn_conjunction:
  name_en: "Moon-Saturn Conjunction Yoga (Visha Yoga)"
  name_hi: "चंद्र-शनि युति योग (विष योग)"
  type: "malefic"
  formation:
    condition: "Moon and Saturn are conjunct in the same sign. This is sometimes called Visha (poison) Yoga. Moon represents the mind, mother, and emotional self; Saturn represents karma, detachment, and suffering. Saturn's cold energy suppresses the Moon's natural luminosity and warmth."
    planets: ["moon", "saturn"]
    houses_required: []
  cancellation:
    - "The conjunction is in Libra (Saturn exalted) or Taurus (Moon exalted) — some dignity reduces harshness"
    - "Jupiter aspects the conjunction — wisdom transforms suffering into equanimity"
    - "The Moon is full (bright Paksha Bala) — luminosity overcomes Saturn's shadow"
  effects:
    general: "Moon-Saturn conjunction creates emotional heaviness, detachment from the mother, melancholy, and a tendency toward depression or chronic emotional suffering. The native has a serious, somber emotional nature and may have a difficult relationship with their mother. However, Saturn also gives the Moon discipline and emotional resilience — the native learns to process emotions systematically and may develop extraordinary psychological strength through suffering."
    health: "Mental health challenges, depression, anxiety, mother's health issues."
  source: "Phaladeepika chapter 9; Saravali — Visha Yoga"
  confidence: "high"

sun_saturn_conjunction:
  name_en: "Sun-Saturn Conjunction Yoga"
  name_hi: "सूर्य-शनि युति योग"
  type: "malefic"
  formation:
    condition: "Sun and Saturn are conjunct in the same sign. Sun is the king, vitality, and father; Saturn is the servant, karma, and restriction. As mutual enemies (Saturn is Sun's son in mythology but their energies conflict), their conjunction creates tension between authority and limitation, between the father and karmic debt."
    planets: ["sun", "saturn"]
    houses_required: []
  cancellation:
    - "The conjunction is in Libra (Saturn exalted) — karmic discipline achieves diplomatic balance"
    - "Jupiter aspects the conjunction — wisdom and grace mediate the father-karma conflict"
  effects:
    general: "The native has a difficult relationship with authority, their father, and government figures. Their ego (Sun) is constantly tested by karmic restrictions (Saturn). Career advancement is delayed but eventually achieved through hard work. The native may have a government or administrative career but faces obstacles and delays. Father may be stern, distant, or face health challenges."
    career: "Government service, administration, law, engineering — achieved through persistence."
  source: "Phaladeepika chapter 9; classical Sun-Saturn analysis"
  confidence: "high"

mars_jupiter_conjunction:
  name_en: "Mars-Jupiter Conjunction Yoga"
  name_hi: "मंगल-गुरु युति योग"
  type: "benefic"
  formation:
    condition: "Mars and Jupiter are conjunct in the same sign. Mars is the warrior; Jupiter is the teacher. Together they create a warrior-philosopher — brave, righteous, expansive in action, and protective of dharma. This is a generally benefic combination in classical texts."
    planets: ["mars", "jupiter"]
    houses_required: []
  cancellation:
    - "The conjunction is in the 8th or 12th house — energy expressed as hidden or isolated"
    - "Both planets are in a sign where Mars is debilitated (Cancer)"
  effects:
    general: "This powerful combination creates a person of both courage and wisdom. Mars gives the drive to act; Jupiter gives the wisdom to act righteously. The native is brave, philosophical, athletic, and has a strong sense of justice. They may be a warrior for dharma — a lawyer, military leader, or anyone who fights for righteous causes with both force and wisdom."
    career: "Military, law, sports, medicine, teaching in competitive fields."
  source: "Phaladeepika chapter 9; classical Mars-Jupiter benefic combination"
  confidence: "high"

# =============================================================================
# SPECIAL CIRCUMSTANTIAL YOGAS
# Source: BPHS; Jataka Parijata; Saravali
# =============================================================================

musala_yoga:
  name_en: "Musala Yoga (Pestle Yoga)"
  name_hi: "मुसल योग"
  type: "benefic"
  formation:
    condition: "All planets occupy fixed signs (Taurus, Leo, Scorpio, Aquarius) exclusively. Musala is one of the Nabhasa Dala (pair) yogas and indicates a person of steady character, fixed opinions, and enduring wealth and position."
    planets: []
    houses_required: []
    sign_condition: "all_planets_in_fixed_signs"
  cancellation:
    - "Any planet (excluding Rahu/Ketu) is in a movable or dual sign"
  effects:
    general: "The native is of fixed character, unwavering in their opinions and commitments. They have lasting wealth, stable relationships, and enduring fame. Fixed signs give durability — what the native builds lasts. Musala indicates a person who, once committed to a path, follows it consistently throughout life."
  source: "BPHS chapter 13; Brihat Jataka chapter 3 on Nabhasa yogas"
  confidence: "high"

nala_yoga:
  name_en: "Nala Yoga (Reed Yoga)"
  name_hi: "नल योग"
  type: "mixed"
  formation:
    condition: "All planets occupy dual signs (Gemini, Virgo, Sagittarius, Pisces) exclusively. Nala Yoga indicates a person who is adaptable, communicative, skilled in multiple areas, and changeable in their positions and commitments."
    planets: []
    houses_required: []
    sign_condition: "all_planets_in_dual_signs"
  cancellation:
    - "Any planet (excluding Rahu/Ketu) is in a fixed or movable sign"
  effects:
    general: "Nala natives are like reeds — flexible and adaptable but sometimes hollow or unstable. They excel in communication, mediation, and dual vocations. They may serve in multiple roles simultaneously and adapt easily to changing circumstances. However, their changing nature can make them seem unreliable, and they may struggle to commit to one path for long."
  source: "BPHS chapter 13; Brihat Jataka chapter 3"
  confidence: "high"

chapa_yoga:
  name_en: "Chapa Yoga (Bow Yoga)"
  name_hi: "चाप योग"
  type: "benefic"
  formation:
    condition: "Planets are distributed across specific house types in a bow pattern. Classically: all planets in movable signs (Aries, Cancer, Libra, Capricorn). Indicates a person of dynamic, action-oriented temperament who initiates changes and leads."
    planets: []
    houses_required: []
    sign_condition: "all_planets_in_movable_signs"
  cancellation:
    - "Any planet (excluding Rahu/Ketu) is in a fixed or dual sign"
  effects:
    general: "All planets in movable (cardinal/chara) signs creates a person of initiative, leadership, and constant motion. Like an arrow released from a bow, they are direct and purposeful. They are natural leaders and initiators who do not cling to the past. However, they may lack the staying power of fixed signs and need to develop follow-through."
  source: "BPHS chapter 13 on Nabhasa yogas; Brihat Jataka"
  confidence: "high"

ardha_chandra_yoga:
  name_en: "Ardha Chandra Yoga (Half-Moon Yoga)"
  name_hi: "अर्धचंद्र योग"
  type: "benefic"
  formation:
    condition: "All planets are distributed in seven consecutive houses (occupying exactly half the wheel), creating a half-moon (semi-circle) shape in the chart. This is a Nabhasa Ashraya yoga indicating the native has a certain orientation — all energies flow in one direction."
    planets: []
    houses_required: []
  cancellation:
    - "Planets occupy more or fewer than seven consecutive houses"
  effects:
    general: "The native's entire planetary energy is concentrated in one half of the chart. They are focused and directed, with all life themes related to one sector of experience. The native may achieve prominence in their chosen sphere but neglect the opposite sectors of life. Classical texts describe the Ardha Chandra native as achieving fame and prosperity in a specific domain."
  source: "BPHS chapter 13; Brihat Jataka chapter 3 — Ashraya Nabhasa yoga"
  confidence: "high"

vajra_yoga:
  name_en: "Vajra Yoga (Thunderbolt Yoga)"
  name_hi: "वज्र योग"
  type: "benefic"
  formation:
    condition: "All benefic planets (Jupiter, Venus, Mercury, Moon) are in the 1st and 7th houses (kendras), AND all malefic planets (Sun, Mars, Saturn, Rahu, Ketu) are in the 4th and 10th houses (also kendras). Good and challenging energies balance in all four pillars."
    planets: ["jupiter", "venus", "mercury", "moon"]
    houses_required: [1, 4, 7, 10]
  cancellation:
    - "Any misplaced planet breaks the precise pattern"
  effects:
    general: "Vajra Yoga creates a person of extraordinary power and resilience — like the vajra (thunderbolt) weapon of Indra which is both invincible and purifying. The native possesses the qualities of both extreme beneficence and extreme toughness. They enjoy royal status, happiness in the first and last parts of life, and overcome all adversity through inner strength."
  source: "BPHS chapter 35; Phaladeepika chapter 6 on Yuga Nabhasa yogas"
  confidence: "high"

yava_yoga:
  name_en: "Yava Yoga (Barleycorn Yoga)"
  name_hi: "यव योग"
  type: "benefic"
  formation:
    condition: "All benefic planets (Jupiter, Venus, Mercury, Moon) are in the 4th and 10th houses (two opposite kendras), AND all malefic planets (Sun, Mars, Saturn, Rahu, Ketu) are in the 1st and 7th houses (the other two kendras). The pattern forms a barleycorn shape."
    planets: ["jupiter", "venus", "mercury", "moon"]
    houses_required: [1, 4, 7, 10]
  cancellation:
    - "Any planet is out of the required kendra positions"
  effects:
    general: "Yava Yoga brings happiness in the middle portion of life. The native has a balanced mixture of benefic and challenging energies distributed across all four angular houses. They face challenges through the self and relationships (1st and 7th malefics) but find support through home and career (4th and 10th benefics). Middle age is the peak period of prosperity."
  source: "BPHS chapter 35; Phaladeepika chapter 6"
  confidence: "high"

kamala_yoga:
  name_en: "Kamala Yoga (Lotus Yoga)"
  name_hi: "कमल योग"
  type: "benefic"
  formation:
    condition: "All seven planets (Sun through Saturn, excluding Rahu/Ketu) are distributed in all four kendra houses (1st, 4th, 7th, 10th) such that each kendra has at least one planet. The chart's angular houses are fully populated."
    planets: []
    houses_required: [1, 4, 7, 10]
  cancellation:
    - "Any kendra house is empty"
    - "Rahu or Ketu are counted as filling a kendra (they are nodes, not planets)"
  effects:
    general: "Kamala Yoga (also related to Chatussagara) creates a person of exceptional fortune — like a lotus that grows from mud and reaches full beauty in all four directions. The native achieves fame, wealth, and a complete life with strength in all four pillars (self, home, relationships, and career)."
  source: "BPHS chapter 35; Phaladeepika"
  confidence: "high"

pasha_yoga:
  name_en: "Pasha Yoga (Noose Yoga)"
  name_hi: "पाश योग"
  type: "mixed"
  formation:
    condition: "All planets are concentrated in five consecutive houses, creating a noose-like concentration. Pasha is a Nabhasa Sankhya yoga (classification by number of occupied houses). Five consecutive houses occupied creates a bound, focused, but restricted energy pattern."
    planets: []
    houses_required: []
  cancellation:
    - "Planets spread across more than five houses — not a pure Pasha"
  effects:
    general: "The native has a bound or restricted quality — their life themes are concentrated in five related areas while seven houses remain empty. This creates intensity and expertise in certain domains but neglect of others. Classical texts describe the Pasha native as service-oriented, possibly bound to family or social obligations, skilled in their domain but not broadly free."
  source: "BPHS chapter 13 — Sankhya Nabhasa yoga"
  confidence: "medium"

# =============================================================================
# MEDICAL / LONGEVITY YOGAS
# Source: Brihat Jataka Ch.8; BPHS Ch.44; Saravali Ch.35
# =============================================================================

mrityubhaga_yoga:
  name_en: "Mrityu Bhaga Yoga (Death Zone Yoga)"
  name_hi: "मृत्यु भाग योग"
  type: "malefic"
  formation:
    condition: "A planet (especially the Lagna lord, Sun, or Moon) is placed at the exact Mrityu Bhaga degree for that planet in that sign — the classical death-zone degrees as defined in Brihat Jataka. These specific degrees are considered the most vulnerable and dangerous positions for each planet."
    planets: []
    houses_required: []
    sign_condition: "mrityu_bhaga_degree"
  cancellation:
    - "Jupiter or Venus within 3 degrees of the Mrityu Bhaga planet"
    - "The Mrityu Bhaga planet receives a strong aspect from its natural friend"
  effects:
    general: "A planet in its Mrityu Bhaga degree loses strength and becomes dangerous for the matters it governs. For the Sun or Lagna lord, this indicates health dangers; for the Moon, emotional crises; for Jupiter, loss of wisdom and protection. Classical texts require specific remedies for planets at Mrityu Bhaga degrees."
  source: "Brihat Jataka chapter 8; Saravali chapter 35 on degree positions"
  confidence: "medium"

papaghna_yoga:
  name_en: "Papaghna Yoga (Destroyer of Sins Yoga)"
  name_hi: "पापघ्न योग"
  type: "benefic"
  formation:
    condition: "Jupiter and the Moon are mutually aspecting (in opposition, 7th from each other) AND both are in strong signs or kendras. This powerful protective combination with the two greatest natural benefics facing each other across the chart creates a shield against all negative karmas."
    planets: ["jupiter", "moon"]
    houses_required: []
  cancellation:
    - "Either Jupiter or Moon is severely afflicted or debilitated"
    - "Rahu or Ketu intervenes between them (same sign as one of them)"
  effects:
    general: "Jupiter and Moon in full aspect (opposition) creates a powerful channel of protective and nourishing energy across the chart. Wisdom (Jupiter) and emotional nourishment (Moon) support each other across the two hemispheres of the chart. The native is protected from most dangers, has strong moral character, and receives divine grace throughout life."
  source: "Saravali chapter 35; classical Jupiter-Moon full aspect"
  confidence: "high"

vesi_voshi_full:
  name_en: "Vesi-Voshi (Full Sun Flanking Yoga)"
  name_hi: "वेशी-वोशी (पूर्ण)"
  type: "benefic"
  formation:
    condition: "Planets occupy both the 2nd AND 12th signs from the Sun simultaneously (this is Ubhayachari), AND the specific planets flanking the Sun include natural benefics (Jupiter, Venus, or Mercury) on at least one side. The Sun is fully supported by benefic energy on both sides."
    planets: ["sun"]
    houses_required: []
  cancellation:
    - "Only malefics flank the Sun — this becomes Papa Kartari on Sun"
    - "The benefic on one side is combust (within proximity to Sun that nullifies it)"
  effects:
    general: "This combination gives the Sun exceptional strength — supported by beneficial planetary energy on both sides. The native has a radiant, well-supported identity with intelligence (if Mercury flanks), wisdom (if Jupiter flanks), or beauty and social grace (if Venus flanks). Authority comes naturally and is sustained."
  source: "Phaladeepika chapter 8 on Sun adjacency yogas"
  confidence: "high"


# =============================================================================
# NEECH BHANGA RAJA YOGA — SPECIFIC CONDITIONS (BPHS Ch.28)
# Each condition that cancels debilitation is a named yoga in its own right.
# =============================================================================

neech_bhanga_debil_lord_lagna_kendra:
  name_en: "Neech Bhanga — Debilitation Lord in Kendra from Lagna"
