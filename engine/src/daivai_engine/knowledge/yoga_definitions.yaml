  name_hi: "केमद्रुम भंग नियम ५"
  type: "benefic"
  formation:
    condition: "The Moon is full or has high Paksha Bala — the angular separation between Moon and Sun is more than 120 degrees (Moon is waxing and bright). A bright Moon is inherently strong and does not suffer from Kemadruma regardless of planetary adjacency."
