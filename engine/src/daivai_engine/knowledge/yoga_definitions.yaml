    - "Jupiter in 7th is debilitated (Capricorn)"
  effects:
    general: "Marriage directly catalyzes the birth of children — the marriage and parenthood are karmically linked. The native's most profound experience of marriage comes through raising virtuous children. Jupiter in the partnership house blessing the 5th house energy creates a deeply familial marriage where children bring both partners tremendous joy and purpose."
    relationships: "Partner brings strong parental energy and desire for family. Marriage is fundamentally a parental partnership."
  source: "Classical texts on 7th-5th connections; Phaladeepika"
  confidence: "medium"

# =============================================================================
# ADDITIONAL SANNYASA / PRAVRAJYA YOGAS (Phaladeepika Ch.15)
