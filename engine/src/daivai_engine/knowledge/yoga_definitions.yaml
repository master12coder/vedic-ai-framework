    career: "Supreme achievement in vocations governed by the exalted planets' significations."
    spiritual: "The native embodies elevated qualities — they are perceived as extraordinary by peers and may be considered divinely favored."
  source: "Phaladeepika chapter 7; classical commentary"
  confidence: "high"

phaladeepika_raj_nidhana:
  name_en: "Phaladeepika Raj Yoga (10th Lord Exalted)"
  name_hi: "फलदीपिका राज योग (दशमेश उच्च)"
