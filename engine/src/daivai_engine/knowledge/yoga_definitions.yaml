parashara_raj_3:
  name_en: "Parashara Raj Yoga 3"
  name_hi: "पराशर राज योग ३"
  type: "benefic"
  formation:
    condition: "The lords of the 1st and 9th houses are conjunct or in mutual aspect. Lagna lord meets fortune lord."
    planets: ["1st_lord", "9th_lord"]
    houses_required: [1, 9]
