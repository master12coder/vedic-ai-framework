kemadruma_bhanga_moon_kendra:
  name_en: "Kemadruma Bhanga — Moon in Kendra (Primary Cancellation)"
  name_hi: "केमद्रुम भंग — चन्द्र केन्द्र में"
  type: "benefic"
  formation:
    condition: "Kemadruma Yoga (no planet in 2nd or 12th from Moon) is present BUT the Moon is simultaneously placed in a kendra house (1st, 4th, 7th, or 10th) from the Lagna. The Moon in a kendra gains strength from the angular house position, which classical texts say cancels or significantly reduces Kemadruma's effects."
    planets: ["moon"]
    houses_required: [1, 4, 7, 10]
    sign_condition: "kemadruma_present_but_moon_in_kendra"
  cancellation:
    - "Moon is in the 6th or 8th house from Lagna despite kendra position — dusthana weakens"
    - "Moon is severely debilitated AND waning — natural weakness overrides kendra strength"
    - "Malefics heavily afflict the Moon even in the kendra"
  effects:
    general: "The Kemadruma Bhanga through Moon in kendra gives the Moon angular strength that compensates for its isolation. While the 2nd and 12th from Moon are empty, the Moon's powerful position in a kendra from Lagna provides foundational support. The native may still experience some Kemadruma qualities (emotional periods of isolation) but these are significantly diminished by the kendra strength."
    emotional: "Emotional resilience despite occasional isolation. The native's Moon strength from the kendra position provides a stable center even without flanking planetary support."
  strength_factors:
    - "Most powerful cancellation when Moon is in the 1st house (lagna itself)"
    - "Strong cancellation when Moon is in the 10th (career kendra supports identity)"
    - "Enhanced when Moon is also waxing and in a benefic nakshatra"
    - "Combined with other Kemadruma Bhanga conditions for full cancellation"
  source: "BPHS chapter 30; Phaladeepika chapter 7 on Kemadruma Bhanga conditions"
  confidence: "high"

kemadruma_bhanga_benefic_aspect:
  name_en: "Kemadruma Bhanga — Jupiter or Venus Aspects Moon"
  name_hi: "केमद्रुम भंग — गुरु/शुक्र चन्द्र को देखे"
  type: "benefic"
  formation:
    condition: "Kemadruma Yoga (no planet in 2nd or 12th from Moon) is present BUT Jupiter or Venus (natural benefics) casts a direct aspect on the Moon. The benefic planet's aspect provides the missing supportive energy that Kemadruma lacks — a benefic 'looking after' the isolated Moon."
    planets: ["moon", "jupiter", "venus"]
    houses_required: []
    sign_condition: "kemadruma_but_jupiter_or_venus_aspects_moon"
  cancellation:
    - "The aspecting benefic (Jupiter or Venus) is itself severely combust or debilitated"
    - "Rahu conjuncts the aspecting benefic — corrupts its protective aspect"
    - "Moon is in a dusthana house AND waning — compound weakness may overpower the aspect"
  effects:
    general: "Jupiter or Venus looking at the isolated Moon provides divine protection and nourishment to the lonely Moon. This is one of the most important Kemadruma Bhanga conditions — the benevolent gaze of the greatest benefics rescues the Moon from isolation. The native may still feel emotional sensitivity but receives important emotional and material support from beneficent sources (teachers, friends, partners)."
    relationships: "Despite the Moon's isolation, benefic assistance comes through key relationships. A wise mentor (Jupiter) or loving partner (Venus) provides the emotional support that Kemadruma would otherwise deny."
  strength_factors:
    - "Jupiter's aspect is considered the most powerful Kemadruma cancellation"
    - "Enhanced when Jupiter is exalted in Cancer while aspecting Moon — double benefic"
    - "Venus's aspect particularly helps with relationship support for the isolated Moon"
    - "More powerful when the aspecting benefic is also in a kendra or trikona"
  source: "BPHS chapter 30; Phaladeepika chapter 7 on Kemadruma Bhanga"
  confidence: "high"

