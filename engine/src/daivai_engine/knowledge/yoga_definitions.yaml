    - "Chara Lagna is simultaneously afflicted by multiple malefics"
  effects:
    general: "Jaimini's highest conferral of Raj Yoga — exaltation strength applied to the soul's karmic house. The native achieves extraordinary status, recognition, and royal-like authority in their field. This is considered more powerful than standard Parashari Raj Yoga in Jaimini methodology."
  source: "Jaimini Sutras; Jataka Parijata chapter 5"
  confidence: "high"

