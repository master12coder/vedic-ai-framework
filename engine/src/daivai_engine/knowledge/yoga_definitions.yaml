  formation:
    condition: "The Moon receives an aspect from a natural benefic planet (Jupiter, Venus, or unafflicted Mercury) through the standard aspects (7th aspect, or Jupiter's special 5th and 9th aspects). The benefic aspect from a distance provides protection to the isolated Moon."
