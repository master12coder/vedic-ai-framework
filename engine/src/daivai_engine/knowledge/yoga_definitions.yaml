  formation:
    condition: "All three natural benefics — Jupiter, Venus, AND Mercury — are placed in the 6th, 7th, and 8th houses from the Moon sign (in any combination). This is the complete form of Adhi Yoga where all three wisdom, beauty, and intelligence planets surround the Moon's opposite hemisphere, creating maximum support."
    planets: ["jupiter", "venus", "mercury"]
    houses_required: [6, 7, 8]
    sign_condition: "all_three_benefics_in_6_7_8_from_moon"
  cancellation:
    - "Any of the three benefics is severely combust or debilitated"
    - "Rahu conjuncts Jupiter in the 6/7/8 sector from Moon — Guru Chandal corrupts"
    - "Saturn hemmes the benefic sector creating Papa Kartari on the Adhi Yoga"
  effects:
    general: "The complete and most powerful form of Adhi Yoga — all three natural benefics positioned to support the Moon creates a chart of exceptional grace. The native is a natural leader, wealthy, healthy, and blessed with wisdom, beauty, and intelligence simultaneously. Classical texts predict that such a native becomes a head of state, chief minister, or ruler."
    career: "Rise to the highest levels of their profession. Natural leadership ability backed by wisdom (Jupiter), diplomacy (Venus), and intelligence (Mercury). The native commands institutions."
