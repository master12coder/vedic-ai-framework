durudhura_full_benefic:
  name_en: "Durudhura Yoga — Full Benefic Flanking"
  name_hi: "दुरधुरा योग — पूर्ण शुभ परिप्राप्ति"
  type: "benefic"
  formation:
    condition: "Natural benefic planets (Jupiter, Venus, Mercury — excluding Sun, Rahu, Ketu) are placed in BOTH the 2nd AND the 12th signs from the Moon simultaneously, AND both flanking planets are natural benefics. This is the most auspicious form of Durudhura where the Moon is completely embraced by beneficial energy."
    planets: ["jupiter", "venus", "mercury"]
    houses_required: []
    sign_condition: "benefics_in_both_2nd_and_12th_from_moon"
  cancellation:
    - "Either flanking benefic is severely combust or debilitated"
    - "Rahu or Ketu is conjunct with one of the flanking benefics"
    - "Moon itself is debilitated or in a highly afflicted state"
  effects:
    general: "The Moon is perfectly supported on both sides by benevolent planetary energy — wisdom (Jupiter), beauty/pleasure (Venus), or intelligence (Mercury) before and behind the Moon. This creates an extraordinarily balanced and supported emotional life. The native has a generous, well-rounded character, blessed with support from family, community, and nature. They are prosperous, well-liked, and emotionally stable."
    finance: "Wealth flowing from both directions — income (12th from Moon = givers) and family savings (2nd from Moon). The native is financially well-supported and generous."
    relationships: "Exceptionally harmonious family and social relationships. The native is beloved by all who know them."
  strength_factors:
    - "Strongest when Jupiter flanks Moon on both sides (two Jupiter transits cannot do this natally, so Jupiter on one side and Venus on the other is the best)"
    - "Enhanced when both flanking benefics are in dignity (own or exalted)"
    - "More powerful when Moon is also full (Shukla Paksha) and in a benefic sign"
    - "Creates a natural Pushkala Yoga if Moon is also strong"
  source: "Phaladeepika chapter 7 on Durudhura; BPHS chapter 30"
  confidence: "high"

durudhura_full_malefic:
  name_en: "Durudhura Yoga — Full Malefic Flanking"
  name_hi: "दुरधुरा योग — पूर्ण अशुभ परिप्राप्ति"
  type: "malefic"
  formation:
    condition: "Natural malefic planets (Saturn, Mars — excluding Sun and nodes in traditional Phaladeepika) are placed in BOTH the 2nd AND 12th signs from the Moon simultaneously, AND both flanking planets are natural malefics. This is the most challenging form of Durudhura where the Moon is hemmed between malefic energy from both sides."
    planets: ["saturn", "mars"]
    houses_required: []
    sign_condition: "malefics_in_both_2nd_and_12th_from_moon"
  cancellation:
    - "Jupiter aspects Moon from a kendra or trikona — divine protection moderates malefics"
    - "Moon is in own sign (Cancer) or exalted (Taurus) — natural strength resists"
    - "Moon is full and bright (Purnima) — paksha bala overcomes flanking malefics"
  effects:
    general: "The Moon is hemmed between harsh energy on both sides. The native may face emotional challenges, family conflicts, and a life that requires constant effort to maintain stability. Saturn flanking creates delays and austerity; Mars flanking creates conflict and urgency. The native develops exceptional resilience through adversity — they are forged through difficulty."
    emotional: "Emotional challenges throughout life. The native learns to manage their emotional life through discipline (Saturn) and courage (Mars) rather than receiving nurturing support."
    finance: "Financial outflows from both sides — debt (12th from Moon) and family obligations (2nd from Moon) can create financial pressure."
  strength_factors:
    - "Most intense when both malefics are also aspecting each other (mutual malefic aspect)"
    - "More severe when Moon is waning (Krishna Paksha) and in a malefic sign"
    - "Jupiter's aspect on Moon is the most powerful remedy for this yoga"
    - "Less severe when the malefics are in dignity (Saturn in Libra, Mars in Capricorn)"
  source: "Phaladeepika chapter 7 on Durudhura malefic variants; BPHS chapter 30"
  confidence: "high"

