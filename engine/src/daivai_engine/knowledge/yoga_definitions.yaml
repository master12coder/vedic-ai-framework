brahma_yoga:
  name_en: "Brahma Yoga (Creator Trinity)"
  name_hi: "ब्रह्म योग"
  type: "benefic"
  formation:
    condition: "Jupiter, Venus, and Mercury — the three primary natural benefics representing Dharma (Jupiter), Kama (Venus), and Artha (Mercury) — are all placed in kendra houses (1, 4, 7, 10) from the lagna. This triple-benefic kendra placement creates the Brahma Yoga."
    planets: ["jupiter", "venus", "mercury"]
    houses_required: [1, 4, 7, 10]
    sign_condition: "none"
  cancellation:
    - "Any one of the three is severely combust, debilitated, or afflicted by malefics"
    - "All three are in the same kendra — concentration rather than distribution reduces the full yoga"
  effects:
    general: "Named after Brahma the Creator, this yoga gifts the native with extraordinary creative and intellectual power. The three pillars of beneficial planetary energy positioned in the most powerful houses of the chart create someone blessed in wisdom (Jupiter), beauty and arts (Venus), and commerce/intellect (Mercury) simultaneously. They are creative, prosperous, and intellectually luminous."
    career: "Multi-talented success across intellectual, artistic, and commercial domains. The native may excel as a philosopher-businessman, creative scholar, or wise entrepreneur."
    spiritual: "Deep connection to the creative impulse of the universe. The native is a natural creator who leaves lasting contributions to human civilization."
  source: "Classical Vedic texts; BPHS benefic combinations"
  confidence: "high"

mrityu_bhaga_yoga:
  name_en: "Mrityu Bhaga Yoga (Critical Degree Affliction)"
  name_hi: "मृत्युभाग योग"
  type: "malefic"
  formation:
    condition: "The Moon OR the Lagna falls in the Mrityu Bhaga (death degree) of its sign — specific critical degrees that classical texts associate with vulnerability. These are: Aries 26°, Taurus 12°, Gemini 13°, Cancer 25°, Leo 24°, Virgo 11°, Libra 26°, Scorpio 14°, Sagittarius 13°, Capricorn 25°, Aquarius 24°, Pisces 12°."
    planets: ["moon"]
    houses_required: []
    sign_condition: "mrityu_bhaga_degree"
  cancellation:
    - "Jupiter closely aspects or conjuncts the planet in Mrityu Bhaga"
    - "The planet is vargottama (same sign in rashi and navamsha)"
    - "Strong yogakaraka aspects the afflicted point"
  effects:
    general: "The Moon or Lagna at these specific degrees weakens the vitality or emotional strength of the native at a subtle level. Classical texts prescribe remedial measures (Mrityunjaya Japa, Durgapuja) for natives born with Moon in Mrityu Bhaga. The yoga may manifest as recurring health crises, emotional vulnerability, or unexplained misfortune at specific life junctures."
  source: "BPHS; classical Nakshatra texts; Muhurta Chintamani (as reference)"
  confidence: "medium"

gandanta_yoga:
  name_en: "Gandanta Yoga (Junction of Water and Fire Signs)"
  name_hi: "गण्डान्त योग"
  type: "malefic"
  formation:
    condition: "The Moon OR the Lagna degree falls in Gandanta — the junction point between a water sign (Cancer, Scorpio, Pisces) and the following fire sign (Leo, Sagittarius, Aries). Specifically: last 3°20' of Cancer/Scorpio/Pisces or first 3°20' of Leo/Sagittarius/Aries."
    planets: ["moon"]
    houses_required: []
    sign_condition: "gandanta_degree"
  cancellation:
    - "Jupiter closely aspects the Gandanta Moon"
    - "Moon is within the first 0°40' of a fire sign (Anuradha-Jyeshtha junction is considered more severe than others)"
    - "Strong lagna and lagna lord compensate for the Gandanta affliction"
  effects:
    general: "Gandanta (from 'gand' = knot/difficult spot) represents a cosmic junction where karmic knots accumulate. Birth with Moon in Gandanta traditionally indicates difficulty at birth (for mother or child), complex family karma, and challenging emotional passages in life. The native may face recurring crises at Gandanta transits. Classical Vedic tradition prescribes immediate Shanti rituals (Nakshatra Shanti) for Gandanta births."
  source: "BPHS chapter 8; Nakshatra Chintamani; Brihat Jataka commentary"
  confidence: "high"

# =============================================================================
