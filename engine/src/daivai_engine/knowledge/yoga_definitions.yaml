    planets: ["saturn", "mars", "mercury"]
    houses_required: [2]
    sign_condition: "saturn_mars_with_mercury_or_2nd_lord"
  cancellation:
    - "Jupiter aspects Mercury or the 2nd house — wisdom softens harsh speech"
    - "Venus conjoins Mercury in the 2nd — grace and charm temper harshness"
    - "Mercury is exalted in Virgo — strength partially overcomes malefic influence"
  effects:
    general: "The native tends toward harsh, blunt, or cutting communication. Their speech may inadvertently wound others, or they may deliberately use words as weapons. In positive expression, this yoga can manifest as directness, precision, or fearless truth-telling. In negative expression, it creates social friction, broken relationships, and enemies through speech."
    relationships: "Family relationships may be strained through harsh speech. Partnerships may be challenged by the native's blunt communication style."
    career: "In some fields (surgery, law, debate, crisis communication), this directness of speech is a professional asset."
  strength_factors:
    - "Most intense when both Saturn and Mars conjunct Mercury in the 2nd"
    - "More severe in Scorpio or Aries (Mars-ruled signs amplifying aggression)"
    - "Less harmful when the combination is in Saturn's own signs (Capricorn, Aquarius) — controlled harshness"
    - "Remedied through daily speech practice: conscious communication and mantra japa"
  source: "Classical texts on 2nd house speech yogas; Jataka Parijata; Saravali"
  confidence: "medium"

pitru_shraap_yoga:
