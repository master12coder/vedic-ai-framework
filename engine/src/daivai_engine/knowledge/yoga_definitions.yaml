  type: "benefic"
  formation:
    condition: "A planet is in its sign of debilitation AND the lord of that debilitation sign is placed in a kendra (1st, 4th, 7th, or 10th) from the Lagna. Example: Saturn debilitated in Aries, and Mars (lord of Aries) is in a kendra from the Lagna."
    planets: ["any_debilitated_planet"]
    houses_required: [1, 4, 7, 10]
    sign_condition: "debilitation_lord_in_kendra_from_lagna"
  cancellation:
    - "The debilitation sign lord is itself debilitated or severely afflicted"
    - "The debilitation sign lord is combust within 6 degrees of the Sun"
    - "Rahu or Ketu conjuncts the debilitation sign lord, diminishing its beneficence"
  effects:
    general: "The first and most classical condition for Neech Bhanga — the lord of the sign where the planet is debilitated stands guard in a kendra, giving the debilitated planet strength through its house ruler. The native rises from difficulty to achievement, with the kendra house providing a strong platform for recovery."
    career: "Career recovery is indicated — after initial setbacks or struggles, the native finds a position of strength related to the debilitated planet's significations."
    finance: "Financial reversal from difficulty to stability, especially during the mahadasha of the debilitated planet."
  strength_factors:
    - "Strongest when the debilitation lord is exalted or in its own sign in the kendra"
    - "More powerful when the kendra is the 10th house (career recovery) or 1st house (self recovery)"
    - "Enhanced when the debilitated planet is also in a kendra or trikona"
    - "Stronger results when multiple Neech Bhanga conditions are simultaneously present"
  source: "BPHS chapter 28 — Neech Bhanga conditions; Saravali chapter 14"
  confidence: "high"

neech_bhanga_debil_lord_moon_kendra:
  name_en: "Neech Bhanga — Debilitation Lord in Kendra from Moon"
  name_hi: "नीच भंग — चन्द्र से केन्द्र में नीचस्थान स्वामी"
  type: "benefic"
  formation:
    condition: "A planet is in its sign of debilitation AND the lord of that debilitation sign is placed in a kendra (1st, 4th, 7th, or 10th) from the Moon sign. This is the second BPHS condition for Neech Bhanga, applying the kendra test from the Moon rather than the Lagna."
    planets: ["any_debilitated_planet"]
    houses_required: [1, 4, 7, 10]
    sign_condition: "debilitation_lord_in_kendra_from_moon"
  cancellation:
    - "The Moon itself is debilitated (in Scorpio) — weakens the Moon-reference condition"
    - "The debilitation sign lord is hemmed between malefics near the Moon-kendra"
    - "The debilitation sign lord is combust, losing ability to support the debilitated planet"
  effects:
    general: "The Moon-based Neech Bhanga creates emotional resilience — the native may feel the debilitated planet's challenges acutely in their inner life, but the debilitation lord's kendra strength from Moon provides mental and emotional recovery. The native learns to convert emotional vulnerability into emotional strength."
    spiritual: "Emotional maturity and growth through difficulty. The native develops psychological resilience that becomes a defining strength."
  strength_factors:
    - "Stronger when Moon is waxing (shukla paksha) and bright"
    - "Enhanced when Moon is in a kendra or trikona from Lagna as well"
    - "More powerful when Moon itself is strong in dignity"
    - "Combined effect when both lagna-kendra and moon-kendra conditions are simultaneously met"
  source: "BPHS chapter 28 — second Neech Bhanga condition"
  confidence: "high"

neech_bhanga_exalt_lord_kendra:
  name_en: "Neech Bhanga — Exaltation Lord in Kendra"
  name_hi: "नीच भंग — उच्चस्थान स्वामी केन्द्र में"
  type: "benefic"
  formation:
    condition: "A planet is in its sign of debilitation AND the lord of the sign where that planet gets exalted is placed in a kendra from the Lagna or Moon. Example: Mars debilitated in Cancer — Mars is exalted in Capricorn, and Saturn (lord of Capricorn) in a kendra from Lagna activates this Neech Bhanga."
    planets: ["any_debilitated_planet"]
    houses_required: [1, 4, 7, 10]
    sign_condition: "exaltation_lord_in_kendra"
  cancellation:
    - "The exaltation sign lord is itself in debilitation or a dusthana"
    - "The exaltation sign lord is combust or in a planetary war and loses"
    - "Rahu conjuncts the exaltation sign lord, corrupting its restorative influence"
  effects:
    general: "The planet's potential exaltation sign lord stands in a position of power, providing the debilitated planet with the memory and pull of its highest expression. The native's trajectory moves toward the potential of the exalted state, with the exaltation lord guiding the recovery from debilitation."
    career: "The native often achieves at a level that seems beyond their initial circumstances — reaching the heights of what their debilitated planet represents."
  strength_factors:
    - "Most powerful when the exaltation sign lord is itself exalted in the kendra"
    - "Stronger when in the 1st or 10th kendra (direct visibility)"
    - "Enhanced when the exaltation lord receives benefic aspects from Jupiter or Venus"
    - "Most effective during the dasha of either the debilitated planet or the exaltation lord"
  source: "BPHS chapter 28 — third Neech Bhanga condition"
  confidence: "high"

neech_bhanga_exalt_lord_aspects_debil:
  name_en: "Neech Bhanga — Exaltation Lord Aspects Debilitated Planet"
  name_hi: "नीच भंग — उच्चस्वामी नीच ग्रह को देखे"
  type: "benefic"
  formation:
    condition: "The lord of the sign where the debilitated planet gets exalted casts a direct aspect (especially 7th house opposition) on the debilitated planet itself. The exaltation sign lord's gaze lifts the fallen planet toward its potential. Example: Venus debilitated in Virgo — Venus exalts in Pisces; Jupiter (lord of Pisces) aspects Venus across the 7th."
    planets: ["any_debilitated_planet"]
    houses_required: []
    sign_condition: "exaltation_lord_aspects_debilitated_planet"
  cancellation:
    - "The exaltation lord itself is debilitated or severely afflicted"
    - "The aspect is broken by a malefic intercepting between them (very close malefic conjunction)"
    - "The debilitated planet is also combust, making it unable to receive the aspect's benefit"
  effects:
    general: "Direct aspecting relationship between the exaltation lord and the debilitated planet creates a powerful Neech Bhanga. The planet is directly uplifted by the aspect — like a helping hand extended across the chart. The native benefits from associations that remind them of their potential, often through a mentor, teacher, or inspiring relationship."
  strength_factors:
    - "Strongest when the aspect is within 3 degrees (tight orb)"
    - "Enhanced when the exaltation lord is in a kendra simultaneously"
    - "More powerful when Jupiter, the universal benefic, also aspects the configuration"
    - "Results are most pronounced during the antardasha of the aspecting exaltation lord"
  source: "BPHS chapter 28 — fourth Neech Bhanga condition; Phala Deepika commentary"
  confidence: "high"

neech_bhanga_navamsha_exaltation:
  name_en: "Neech Bhanga — Debilitated Planet Exalted in Navamsha"
  name_hi: "नीच भंग — नवांश में नीच ग्रह उच्च"
  type: "benefic"
  formation:
    condition: "A planet is debilitated in the rashi (D1) chart BUT is placed in its sign of exaltation in the Navamsha (D9) chart. The navamsha exaltation overrides the rashi debilitation at a subtle karmic level. Example: Sun debilitated in Libra, but in the navamsha it falls in Aries (Sun's exaltation sign)."
    planets: ["any_debilitated_planet"]
    houses_required: []
    sign_condition: "navamsha_exaltation_of_debilitated_rashi_planet"
  cancellation:
    - "The navamsha itself is severely afflicted (malefics in lagna, 8th, 12th of navamsha)"
    - "The debilitated planet is also combust in the rashi chart — combustion limits navamsha recovery"
    - "No supporting conditions in the rashi chart — pure navamsha elevation without rashi support is weaker"
  effects:
    general: "The debilitated planet in navamsha exaltation reveals its inner strength at the soul level. While surface-level struggles (rashi) are present, the deep karmic potential (navamsha) is elevated. The native often appears stronger in private, spiritual, or inner work than in external circumstances. After the mid-life turning point (navamsha themes activate), the planet's better qualities emerge powerfully."
    spiritual: "Strong inner life and spiritual depth, particularly for the matters the debilitated planet represents. The native's inner compass is clear even when outer conditions are challenging."
  strength_factors:
    - "Most powerful when the navamsha exaltation is in a kendra of the navamsha"
    - "Enhanced when the planet is also Vargottama in other divisional charts"
    - "Stronger when Jupiter aspects the debilitated planet in the rashi chart"
    - "Results manifest most clearly after age 36 (navamsha period of life)"
  source: "BPHS chapter 28; Sarvartha Chintamani on navamsha exaltation as Neech Bhanga"
  confidence: "high"

neech_bhanga_retrograde_reversal:
  name_en: "Neech Bhanga — Debilitated Planet Retrograde"
  name_hi: "नीच भंग — नीच ग्रह वक्री"
  type: "benefic"
  formation:
    condition: "A planet is debilitated in its sign AND is retrograde (vakri) at birth. A retrograde planet moves backward toward its previous position — symbolically moving away from debilitation toward the energy of its previous strong placement. Classical texts interpret retrograde motion as reversing the normal condition, thus partly cancelling debilitation."
    planets: ["any_debilitated_planet"]
    houses_required: []
    sign_condition: "debilitated_and_retrograde"
  cancellation:
    - "The retrograde debilitated planet is also combust (combustion limits retrograde benefit)"
    - "Multiple planets are simultaneously debilitated without other cancellation factors"
    - "The retrograde planet is in a dusthana house without benefic aspects"
  effects:
    general: "A debilitated retrograde planet carries unusual energy — the retrograde motion creates a reversal, and the planet's expression becomes internalized and often inverted. The native may struggle with the planet's affairs in conventional settings but excel in unconventional, creative, or internalized expressions of the same planet. Over time, with self-awareness, the retrograde energy transforms the debilitation into a unique strength."
    personality: "The native has an unconventional relationship with the debilitated planet's themes — they may approach these matters differently than expected, often with greater introspection and eventual mastery."
  strength_factors:
    - "Stronger when the retrograde planet is in a kendra or trikona despite debilitation"
    - "Enhanced when Saturn retrograde (which retrograde is particularly powerful for Saturn)"
    - "Combined with other Neech Bhanga conditions for full cancellation"
    - "Navamsha strength of the retrograde planet amplifies recovery"
  source: "BPHS chapter 28; Jataka Parijata on retrograde debilitation; Saravali commentary"
  confidence: "medium"

neech_bhanga_parivartana_with_exalt_lord:
  name_en: "Neech Bhanga — Exchange with Exaltation Sign Lord"
  name_hi: "नीच भंग — उच्च राशि स्वामी से परिवर्तन"
  type: "benefic"
  formation:
    condition: "The debilitated planet and the lord of its exaltation sign are in exchange (parivartana) — each placed in the other's sign. This powerful mutual exchange creates a special form of Neech Bhanga where the debilitated planet and its exaltation lord trade positions, creating a symbolic movement toward exaltation."
    planets: ["any_debilitated_planet"]
    houses_required: []
    sign_condition: "parivartana_with_exaltation_lord"
  cancellation:
    - "Either planet in the exchange is severely afflicted by Rahu or Ketu conjunction"
    - "Either planet in the exchange is combust or in a planetary war"
    - "The exaltation sign lord is itself debilitated in the exchange"
  effects:
    general: "One of the most powerful forms of Neech Bhanga — the exchange creates a mutual support network where both planets gain strength from the relationship. The native often rises dramatically after initial hardship, with the recovery being remarkable and the ultimate achievement surpassing what might be expected from a debilitated planet alone."
    career: "Career trajectory shows clear reversal — early struggles give way to remarkable achievement in the field indicated by the exchanged planets."
  strength_factors:
    - "This is considered the most powerful single Neech Bhanga condition by many authorities"
    - "Enhanced when one or both planets in the exchange are in kendra or trikona houses"
    - "Stronger when the exchange houses are linked (lord exchange between benefic houses)"
    - "Most potent during the dasha period of either planet involved in the exchange"
  source: "BPHS chapter 28 on Parivartana + Neech Bhanga; Hora Sara commentary"
  confidence: "high"

# =============================================================================
# SPIRITUAL / MOKSHA YOGAS — Beyond Pravrajya and Vairagya
# Sources: BPHS Ch.79, Phaladeepika Ch.27, Saravali Ch.38
