# ── Vastu Dosha definitions ───────────────────────────────────────────────────
# Triggered by specific planets in the 4th house (home, property, comforts).

vastu_doshas:
  Saturn_in_4th:
    name: Griha Bala Dosha
    name_hi: "गृह बल दोष"
    trigger:
      planet: Saturn
      house: 4
    severity: moderate
    description: >
      Saturn in 4th can cause structural issues, delays in home-related matters,
      or a cold and heavy atmosphere at the place of residence.
    remedy_direction: North-East

  Mars_in_4th:
    name: Agni Sthan Dosha
    name_hi: "अग्नि स्थान दोष"
    trigger:
      planet: Mars
      house: 4
    severity: moderate
    description: >
      Mars in 4th creates fire risk, aggressive home environment, or conflicts
      with the mother. The agni element becomes overactive in living spaces.
    remedy_direction: South-East

  Rahu_in_4th:
    name: Vastu Bhaya Dosha
    name_hi: "वास्तु भय दोष"
    trigger:
      planet: Rahu
      house: 4
    severity: mild
    description: >
      Rahu in 4th creates Vastu-related anxiety, unexplained unease at home,
      or instability in property matters. Shadow energy disturbs the 4th house.
    remedy_direction: North-East

  Sun_in_4th:
    name: Pitr Sthan Dosha
    name_hi: "पितृ स्थान दोष"
    trigger:
      planet: Sun
      house: 4
    severity: mild
    description: >
      Sun in 4th can indicate ego conflicts at home, issues with the father
      figure, or a domineering atmosphere that reduces domestic harmony.
    remedy_direction: East

  Ketu_in_4th:
    name: Moksha Sthan Dosha
    name_hi: "मोक्ष स्थान दोष"
    trigger:
      planet: Ketu
      house: 4
    severity: mild
    description: >
      Ketu in 4th creates detachment from home, possible spiritual unease in
      living spaces, or an other-worldly atmosphere that disrupts daily comfort.
    remedy_direction: North-East
