    direction: North
    classification: Devta
    deity: Shikhi
    quality: Highly auspicious — fire of prosperity

  - field: 2
    direction: North
    classification: Devta
    deity: Parjanya
    quality: Auspicious — rain and abundance

  - field: 3
    direction: North
    classification: Manushya
    deity: Jayanta
    quality: Neutral — moderate energy

  - field: 4
    direction: North
    classification: Asura
    deity: Mahendra
