# Vastu Shastra knowledge rules — single source of truth for all directional
# mappings, mandala zone data, room placement rules, Ayadi Shadvarga fields,
# and Vastu dosha definitions.
#
# Auditable by Pandits. Do NOT hardcode these values in Python.

# ── Planet-to-direction mapping (Vastu Dik Bala) ─────────────────────────────
# Each planet governs one Vastu direction. The planet's dignity and placement
# in the natal chart determines that direction's strength for the native.

planet_directions:
  Sun: East
  Moon: North-West
  Mars: South
  Mercury: North
  Jupiter: North-East
  Venus: South-East
  Saturn: West
  Rahu: South-West
  Ketu: North-West  # Ketu shares NW with Moon; both evaluated separately

# ── Direction Hindi names ─────────────────────────────────────────────────────

direction_hi:
  North: "उत्तर"
  North-East: "ईशान"
  East: "पूर्व"
  South-East: "आग्नेय"
  South: "दक्षिण"
  South-West: "नैऋत्य"
  West: "पश्चिम"
  North-West: "वायव्य"
  Center: "ब्रह्मस्थान"

# ── Vastu Purusha Mandala — 8 directional zones + Brahmasthana ───────────────
# Each zone has a ruling planet, element, presiding deity, and significance.
# Zone strength is computed from the ruling planet's natal chart position.

mandala_zones:
  North:
    planet: Mercury
    element: Water
    element_hi: "जल"
    direction_hi: "उत्तर"
    significance: "Wealth, prosperity, career — Kubera's direction"
    deity: Kubera
    color: Green

  North-East:
    planet: Jupiter
    element: Space
    element_hi: "आकाश"
    direction_hi: "ईशान"
    significance: "Wisdom, spirituality, divine blessings — highest prana"
    deity: Shiva
    color: Yellow

  East:
    planet: Sun
    element: Air
    element_hi: "वायु"
    direction_hi: "पूर्व"
    significance: "Health, vitality, new beginnings — Indra's domain"
    deity: Indra
    color: Orange

  South-East:
    planet: Venus
    element: Fire
    element_hi: "अग्नि"
    direction_hi: "आग्नेय"
    significance: "Fire, energy, transformation — Agni's direction"
    deity: Agni
    color: Red

  South:
    planet: Mars
    element: Earth
    element_hi: "पृथ्वी"
    direction_hi: "दक्षिण"
    significance: "Strength, protection, ancestors — Yama's direction"
    deity: Yama
    color: Red

  South-West:
    planet: Rahu
    element: Earth
    element_hi: "पृथ्वी"
    direction_hi: "नैऋत्य"
    significance: "Stability, longevity, heavy energy storage"
    deity: Nirrti
    color: Grey

  West:
    planet: Saturn
    element: Air
    element_hi: "वायु"
    direction_hi: "पश्चिम"
    significance: "Completion, gains, discipline — Varuna's direction"
    deity: Varuna
    color: Blue

  North-West:
    planet: Moon
    element: Air
    element_hi: "वायु"
    direction_hi: "वायव्य"
    significance: "Movement, sociability, help from others — Vayu's direction"
    deity: Vayu
    color: White

  Center:
    planet: null
    element: Space
    element_hi: "आकाश"
    direction_hi: "ब्रह्मस्थान"
    significance: "Sacred center — must remain open; seat of Brahma"
    deity: Brahma
    color: Gold

# ── Room placement rules ──────────────────────────────────────────────────────
# Each room type has an ideal Vastu direction and a ruling planet.
# planet: lagna_lord means the direction is computed dynamically from the chart.

room_rules:
  Kitchen:
    ideal_direction: South-East
    alternate_direction: North-West
    planet: Venus
    direction_hi: "आग्नेय"
    reason: "Agni corner — fire element governs cooking and nourishment"

  Master_Bedroom:
    ideal_direction: South-West
    alternate_direction: South
    planet: Rahu
    direction_hi: "नैऋत्य"
    reason: "Heavy earth energy of SW provides deep rest and marital stability"

  Puja_Room:
    ideal_direction: North-East
    alternate_direction: East
    planet: Jupiter
    direction_hi: "ईशान"
    reason: "Ishan corner has the highest spiritual vibration and divine prana"

  Study:
    ideal_direction: North
    alternate_direction: North-East
    planet: Mercury
    direction_hi: "उत्तर"
    reason: "Mercury rules intellect; North is Kubera's zone of knowledge"

  Main_Entrance:
    ideal_direction: lagna_lord
    alternate_direction: North
    planet: lagna_lord
    direction_hi: "लग्नेश दिशा"
    reason: "Lagna lord direction channels the native's personal energy into home"

  Treasury:
    ideal_direction: North
    alternate_direction: North-East
    planet: Mercury
    direction_hi: "उत्तर"
    reason: "Kubera (deity of wealth) resides in North — keep safe and locker here"

  Bathroom:
    ideal_direction: North-West
    alternate_direction: South-East
    planet: Moon
    direction_hi: "वायव्य"
    reason: "Vayu zone supports the movement of water and waste removal"

# ── Ayadi Shadvarga — 32 energy fields ───────────────────────────────────────
