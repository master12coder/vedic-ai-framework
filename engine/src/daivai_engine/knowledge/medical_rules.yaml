# ── Tridosha Planetary Weights ───────────────────────────────
# Ayurvedic constitution (Prakriti) derived from planetary placements.
# Source: K.S. Charak "Ayurvedic Astrology" Ch.2; Jyotish-Ayurveda synthesis texts
# Mercury is Tridoshic — contributes equally to all three doshas.
tridosha_weights:
  vata:
    description: "Air + Ether humour — governs movement, dryness, nervous system"
    description_hi: "वात — वायु और आकाश का प्रतिनिधित्व"
    primary:
      Saturn: 1.0   # Primary Vata planet — cold, dry, slow
      Rahu: 0.9     # Vata-dominant shadow planet
    secondary:
      Mercury: 0.33  # Tridoshic — shares equally across all three

  pitta:
    description: "Fire + Water humour — governs transformation, heat, digestion"
    description_hi: "पित्त — अग्नि और जल का प्रतिनिधित्व"
    primary:
      Sun: 1.0    # Primary Pitta planet — hot, sharp, light
      Mars: 1.0   # Strong Pitta — heat, aggression, bile
      Ketu: 0.8   # Pitta-dominant shadow planet
    secondary:
      Mercury: 0.33  # Tridoshic

  kapha:
    description: "Water + Earth humour — governs stability, lubrication, growth"
    description_hi: "कफ — जल और पृथ्वी का प्रतिनिधित्व"
    primary:
      Moon: 1.0    # Primary Kapha planet — cool, moist, soft
      Jupiter: 1.0  # Strong Kapha — expansion, fat, phlegm
      Venus: 0.9    # Kapha-dominant — moist, sweet, reproductive
    secondary:
      Mercury: 0.33  # Tridoshic

# Dignity modifiers applied to base tridosha planet weight
# Source: Standard Jyotish dignity weights
tridosha_dignity_modifiers:
  exalted: 1.5       # Planet fully empowered — dosha strongly expressed
  mooltrikona: 1.2   # Near own — strong expression
  own: 1.2           # In own sign — clear expression
  neutral: 1.0       # Average expression
  debilitated: 0.7   # Weakened — dosha not fully expressed
  combust: 0.7       # Burnt — suppressed expression
  retrograde: 1.2    # Retrograde — intensified, internalized expression


# ── Disease Houses ───────────────────────────────────────────
# Three dusthanas (inauspicious houses) primarily govern disease and health.
# Source: BPHS Ch.68 "Arishta Adhyaya" v.1-5; Saravali Ch.6 v.1-3
disease_houses:
  6:
    name: "Roga Bhava"
    name_hi: "रोग भाव"
    role: "Acute disease, debts, enemies, litigation, service"
    disease_type: "Acute, Recurring, Immune challenges"
    severity: acute

  8:
    name: "Randhra / Ayur Bhava"
    name_hi: "रन्ध्र / आयुर्भाव"
    role: "Chronic disease, surgery, longevity, transformation, hidden"
    disease_type: "Chronic, Surgical, Life-threatening"
    severity: chronic

  12:
    name: "Vyaya Bhava"
    name_hi: "व्यय भाव"
    role: "Hospitalization, confinement, bed rest, losses, hidden ailments"
    disease_type: "Hospitalization, Isolation, Convalescence"
    severity: hospitalization


# ── Disease Yogas ────────────────────────────────────────────
# Classic planetary combinations indicating disease vulnerability.
# Computed programmatically in medical.py; metadata stored here.
# Source: BPHS Ch.68-70; Saravali Ch.6; Phaladeepika Ch.6; Jataka Parijata
disease_yogas:

  - name: Sun Afflicted in Dusthana
    name_hindi: सूर्य दुस्थान में पीड़ित
    description: "Sun in 6th, 8th, or 12th house, afflicted by malefics — heart weakness and eye disorders"
    body_system_affected: "Heart, Right eye, Bones"
    disease_indicated: "Heart disease, right eye weakness, bone disorders, chronic fever, vitiligo"
    source: "BPHS Ch.68 v.12; Saravali Ch.6 v.8"

  - name: Moon Afflicted in Dusthana
    name_hindi: चन्द्र दुस्थान में पीड़ित
    description: "Moon in 6th or 8th, afflicted — mental illness, blood disorders, anaemia"
    body_system_affected: "Mind, Blood, Left eye, Fluids"
    disease_indicated: "Mental disorders, depression, blood diseases, anaemia, oedema"
    source: "BPHS Ch.68 v.15; Phaladeepika Ch.6 v.12"

  - name: Mars in 6th or 8th
    name_hindi: मंगल षष्ठ या अष्टम में
    description: "Mars placed in 6th or 8th house — accident risk, surgical need, blood disorders"
