# ── Trisphuta Formulas ───────────────────────────────────────
# Three special sensitive points for medical prashna (Roga Prashna).
# Used in Vedic medical horary to assess vitality, body affliction, and mortality risk.
# Source: Hora Sara Ch.8; BPHS Roga Adhyaya; Jataka Parijata; Sarvartha Chintamani
trisphuta:
  prana_sphuta:
    name: "Prana Sphuta"
    name_hi: "प्राण स्फुट"
    formula: "Lagna_lon + Sun_lon + Moon_lon (mod 360)"
    description: "Vitality point — Sun-Moon-Lagna trinity. Indicates life force and vitality."
    source: "Hora Sara Ch.8 v.4; Sarvartha Chintamani"

  deha_sphuta:
    name: "Deha Sphuta"
    name_hi: "देह स्फुट"
    formula: "Lagna_lon + Mars_lon + Moon_lon (mod 360)"
    description: "Body point — Mars-Moon-Lagna trinity. Indicates physical body affliction."
    source: "Hora Sara Ch.8 v.5; BPHS Roga Adhyaya"

  mrityu_sphuta:
    name: "Mrityu Sphuta"
    name_hi: "मृत्यु स्फुट"
    formula: "Lagna_lon + Saturn_lon + Moon_lon (mod 360)"
    description: "Death/crisis point — Saturn-Moon-Lagna trinity. Indicates longevity stress and mortality risk."
    source: "Hora Sara Ch.8 v.6; Jataka Parijata Medical Ch."

  interpretation:
    same_sign_critical: "Prana and Mrityu Sphuta in same sign — heightened health risk"
    trikona_placement: "Sphuta in trikona (1/5/9) — favorable for recovery"
    dusthana_placement: "Sphuta in dusthana (6/8/12) — challenged health, requires attention"
    malefic_nakshatra: "Sphuta in nakshatra of malefic lord — disease-prone period"


# ── Malefic Planets List ────────────────────────────────────
# Used in disease yoga detection to identify "affliction" of a planet.
# Source: BPHS Ch.3 (natural malefics)
natural_malefics: ["Sun", "Mars", "Saturn", "Rahu", "Ketu"]
natural_benefics: ["Moon", "Mercury", "Jupiter", "Venus"]

# Affliction threshold: planet conjunct malefic within same sign = afflicted
# (Conjunction defined as same sign in whole-sign system)
