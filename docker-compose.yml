services:
  jyotish:
    build: .
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-}
    volumes:
      - ./data:/app/data
      - ./charts:/app/charts

  # Daily scheduler — sends Telegram at 5:30 AM IST
  scheduler:
    build: .
    entrypoint: ["python", "-m", "jyotish_app.scheduler"]
    command: []
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-}
    volumes:
      - ./data:/app/data
      - ./charts:/app/charts
    restart: unless-stopped

  # Telegram bot — interactive commands
  bot:
    build: .
    entrypoint: ["python", "-c", "from jyotish_app.telegram.bot import start_bot; start_bot()"]
    command: []
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
    volumes:
      - ./data:/app/data
      - ./charts:/app/charts
    restart: unless-stopped
