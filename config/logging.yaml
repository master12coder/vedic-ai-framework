# Logging configuration for Vedic AI Framework
# Override at runtime via JYOTISH_LOG_LEVEL env var

version: 1
disable_existing_loggers: false

formatters:
  standard:
    format: "%(asctime)s [%(levelname)s] %(name)s: %(message)s"
    datefmt: "%Y-%m-%d %H:%M:%S"
  detailed:
    format: "%(asctime)s [%(levelname)s] %(name)s:%(funcName)s:%(lineno)d — %(message)s"
    datefmt: "%Y-%m-%d %H:%M:%S"

handlers:
  console:
    class: logging.StreamHandler
    formatter: standard
    level: INFO
    stream: ext://sys.stderr
  file:
    class: logging.handlers.RotatingFileHandler
    formatter: detailed
    level: DEBUG
    filename: logs/jyotish.log
    maxBytes: 10485760  # 10 MB
    backupCount: 3

loggers:
  jyotish:
    level: INFO
    handlers: [console]
    propagate: false
  jyotish.compute:
    level: WARNING
    handlers: [console]
    propagate: false
  jyotish.interpret:
    level: INFO
    handlers: [console]
    propagate: false
  jyotish.learn:
    level: INFO
    handlers: [console]
    propagate: false

root:
  level: WARNING
  handlers: [console]
